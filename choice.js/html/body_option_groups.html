<form autocomplete="on" class="gcp-css">
  <!-- Field 1 -->
  <div class="input-wrapper" id="name-wrapper">
    <input type="text" id="name" name="name" placeholder="&nbsp;" autocomplete="name" />
    <label for="name">Project Name *</label>
    <div class="error">This field is required</div>
    <div class="helper-text">Enter a valid GCP admin email</div>
  </div>

  <!-- Field 2 -->
  <div class="gcp-css input-wrapper" id="email-wrapper">
    <input type="email" id="email" placeholder="&nbsp;" autocomplete="email" />
    <label for="email">User Email</label>
    <div class="error">Enter a valid user email</div>
    <div class="helper-text">Enter a valid GCP admin email</div>
  </div>
</form>

<label for="dropdown">Option groups</label>
<select class="form-control" name="dropdown" id="dropdown" placeholder="This is a placeholder" multiple>
  <option value="">Choose a city</option>
  <optgroup label="UK">
    <option value="London">London</option>
    <option value="Manchester">Manchester</option>
    <option value="Liverpool">Liverpool</option>
  </optgroup>
  <optgroup label="FR">
    <option value="Paris">Paris</option>
    <option value="Lyon">Lyon</option>
    <option value="Marseille">Marseille</option>
  </optgroup>
  <optgroup label="DE" disabled>
    <option value="Hamburg">Hamburg</option>
    <option value="Munich">Munich</option>
    <option value="Berlin">Berlin</option>
  </optgroup>
  <optgroup label="US">
    <option value="New York">New York</option>
    <option value="Washington" disabled>Washington</option>
    <option value="Michigan">Michigan</option>
  </optgroup>
  <optgroup label="SP">
    <option value="Madrid">Madrid</option>
    <option value="Barcelona">Barcelona</option>
    <option value="Malaga">Malaga</option>
  </optgroup>
  <optgroup label="CA">
    <option value="Montreal">Montreal</option>
    <option value="Toronto">Toronto</option>
    <option value="Vancouver">Vancouver</option>
  </optgroup>
</select>

<div style="margin: 20px 0">
  <strong>Collected Values (JSON):</strong>
  <pre
    id="values-display"
    style="background: #eee; padding: 12px; border-radius: 4px; font-size: 13px; margin-top: 8px"
  ></pre>
</div>

<hr />
<!-- <alert-box> value and label provided in one object -> label shown, value returned as a value </alert-box> -->

<script type="module">
  import Choices from "choices.js";

  const dropdown = document.getElementById("dropdown");
  const display = document.getElementById("values-display");

  const textPresetVal = new Choices(dropdown, { allowHTML: true });

  const updateDisplay = () => {
    // Collect all values
    const values = textPresetVal.getValue(true);

    display.textContent = JSON.stringify(values, null, 2);
  };

  // Listen for changes
  dropdown.addEventListener("change", updateDisplay);

  // Trigger on start
  updateDisplay();
</script>
