<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ListManager</title>
    <link rel="stylesheet" href="ListManager.css">
    <link rel="stylesheet" href="../../floating-label-pattern.css" />
</head>
<body>
    <div id="event-counters" style="margin-bottom: 20px; padding: 10px; background: #f0f0f0; border-radius: 4px; font-family: monospace; display: flex; gap: 15px; flex-wrap: wrap;">
        <div>Pick: <span id="count-pick">0</span></div>
        <div>Filter: <span id="count-filter">0</span></div>
        <div>List Load: <span id="count-load">0</span></div>
        <div>Max-Height: <span id="count-mh">0</span></div>
        <div>Highlight: <span id="count-highlight">0</span></div>
    </div>
    <button id="inject-a" class="gcp-css">List A</button>
    <button id="inject-b" class="gcp-css">List B</button>
    <button id="inject-c" class="gcp-css">List C</button>
    <button id="inject-d" class="gcp-css">List D</button>
    <button id="clear-list" class="gcp-css white">Clear</button>

    <div style="margin-top: 10px; margin-bottom: 20px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
        <span>Highlight ID:</span>
        <button class="gcp-css white id-pick" data-id="1">1</button>
        <button class="gcp-css white id-pick" data-id="10">10</button>
        <button class="gcp-css white id-pick" data-id="c1">c1</button>
        <button class="gcp-css white id-pick" data-id="c2">c2</button>
        <button class="gcp-css white id-pick" data-id="x1">x1</button>
        <button class="gcp-css white id-pick" data-id="x2">x2</button>
        <button class="gcp-css white id-pick" data-id="22">22</button>
        <button id="clear-highlight" class="gcp-css white">Clear Highlight</button>
    </div>


    <center-and-height-resizer id="resizer" left="50px" center="350px" height="300px">
        <div id="list-container" style="height: 100%; display: flex; flex-direction: column;">
            <div class="filter">
                <div class="input-wrapper">
                    <input type="text" id="filter-input" placeholder=" ">
                    <label for="filter-input">Filter...</label>
                    <div class="spinner" id="filter-spinner"></div>
                </div>
            </div>
            <div id="options-list-target" style="flex: 1; overflow-y: auto;"></div>
        </div>
    </center-and-height-resizer>

    <div style="margin-top: 20px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
        <input type="text" id="max-height-input" placeholder="e.g. 300px" style="padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 100px;">
        <button id="set-max-height" class="gcp-css">Set</button>
        <button class="gcp-css white mh-preset" data-value="200px">200px</button>
        <button class="gcp-css white mh-preset" data-value="300px">300px</button>
        <button class="gcp-css white mh-preset" data-value="400px">400px</button>
        <button class="gcp-css white mh-preset" data-value="600px">600px</button>
        <button class="gcp-css white mh-preset" data-value="">Reset</button>
    </div>

    <script type="module">
        import "../../../js/CenterAndHeightResizer.js";
        import { ListManager } from "./ListManager.js";

        let currentList = [];
        let activeListName = '';

        const counters = {
            pick: 0,
            filter: 0,
            load: 0,
            mh: 0,
            highlight: 0
        };

        const updateCounter = (key) => {
            counters[key]++;
            document.getElementById(`count-${key}`).textContent = counters[key];
        };

        const fruits = [
            { id: 1, label: 'Apple (1)' },
            { id: 2, label: 'Banana (2)' },
            { id: 3, label: 'Cherry (3)' },
            { id: 4, label: 'Date (4)' },
            { id: 5, label: 'Elderberry (5)' },
            { id: 10, label: 'Jackfruit (10)' },
            { id: 11, label: 'Kiwi (11)' },
            { id: 12, label: 'Lemon (12)' }
        ];

        const colors = [
            { id: 1, label: 'Red (ID 1)' },
            { id: 2, label: 'Green (ID 2)' },
            { id: 3, label: 'Blue (ID 3)' },
            { id: 10, label: 'Yellow (ID 10)' },
            { id: 'c1', label: 'Magenta (c1)' },
            { id: 'c2', label: 'Cyan (c2)' },
            { id: 'c3', label: 'Black (c3)' }
        ];

        const listC = [
            { id: 22, label: 'Apple (22)' },
            { id: 10, label: 'Jackfruit (10)' },
            { id: 4, label: 'Date (4)' },
            { id: 0, label: 'Orange (0)' },
            { id: 2, label: 'Banana (2)' },
            { id: 12, label: 'Lemon (12)' },
            { id: 1, label: 'Apple (1)' },
            { id: 5, label: 'Date (4)' },
            { id: 10, label: 'Yellow (10)' },
            { id: 'c1', label: 'Magenta (c1)' },
            { id: 'c2', label: 'Cyan (c2)' },
            { id: 'x2', label: 'Unique X2 (x2)' }
        ];

        const listD = [
            { id: 2, label: 'Banana (2)' },
            { id: 5, label: 'Elderberry (5)' },
            { id: 12, label: 'Lemon (12)' },
            { id: 'c2', label: 'Cyan (c2)' },
            { id: 'x1', label: 'Unique X1 (x1)' },
            { id: 'y1', label: 'Unique Y1 (y1)' }
        ];

        const lists = { A: fruits, B: colors, C: listC, D: listD };

        const filterInput = document.getElementById('filter-input');
        const maxHeightInput = document.getElementById('max-height-input');

        const syncUrl = () => {
            const url = new URL(window.location);
            url.searchParams.set('l', activeListName || '');
            url.searchParams.set('f', filterInput.value || '');
            url.searchParams.set('m', maxHeightInput.value || '');
            url.searchParams.set('h', manager.propHighlightedId || '');
            
            const selectedIds = currentList.filter(i => i.selected).map(i => i.id);
            if (selectedIds.length) {
                url.searchParams.set('s', selectedIds.join(','));
            } else {
                url.searchParams.delete('s');
            }
            
            window.history.replaceState({}, '', url);
        };

        const manager = new ListManager(document.getElementById('options-list-target'), {
            onItemPick: (item) => {
                updateCounter('pick');
                currentList = currentList.map(opt => {
                    if (opt.id === item.id) return { ...opt, selected: !opt.selected };
                    return opt;
                });
                manager.itemPick(item.id);
                applyFilter();
                syncUrl();
                filterInput.focus();
            }
        });

        const applyFilter = () => {
            manager.setOptions(currentList);
            
            if (manager.propHighlightedId !== null) {
                const stillExists = currentList.some(item => String(item.id) === String(manager.propHighlightedId));
                if (!stillExists) {
                    manager.itemPick(null);
                } else {
                    manager.itemPick(manager.propHighlightedId);
                }
            }
        };

        filterInput.addEventListener('input', () => {
            updateCounter('filter');
            applyFilter();
            syncUrl();
        });

        filterInput.addEventListener('keydown', (e) => {
            const options = manager.propOptions.options || [];
            if (options.length === 0) return;
            const currentIndex = options.findIndex(item => String(item.id) === String(manager.propHighlightedId));

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (currentIndex === -1) manager.itemPick(options[0].id);
                else if (currentIndex < options.length - 1) manager.itemPick(options[currentIndex + 1].id);
                updateCounter('highlight');
                syncUrl();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (currentIndex === -1) manager.itemPick(options[options.length - 1].id);
                else if (currentIndex > 0) manager.itemPick(options[currentIndex - 1].id);
                updateCounter('highlight');
                syncUrl();
            } else if (e.key === 'Enter') {
                e.preventDefault();
                manager.triggerItemPick();
            } else if (e.key === 'Escape') {
                e.preventDefault();
                manager.itemPick(null);
                updateCounter('highlight');
                syncUrl();
            }
        });

        const loadList = (name) => {
            updateCounter('load');
            activeListName = name;
            const baseList = lists[name] || [];
            // Preserve selection if switching lists
            const selectedMap = new Map(currentList.filter(i => i.selected).map(i => [String(i.id), true]));
            currentList = baseList.map(i => ({ ...i, selected: selectedMap.has(String(i.id)) }));
            applyFilter();
            syncUrl();
        };

        document.getElementById('inject-a').addEventListener('click', () => loadList('A'));
        document.getElementById('inject-b').addEventListener('click', () => loadList('B'));
        document.getElementById('inject-c').addEventListener('click', () => loadList('C'));
        document.getElementById('inject-d').addEventListener('click', () => loadList('D'));
        document.getElementById('clear-list').addEventListener('click', () => {
            updateCounter('load');
            activeListName = '';
            currentList = [];
            applyFilter();
            syncUrl();
        });

        document.getElementById('clear-highlight').addEventListener('click', () => {
            manager.itemPick();
            updateCounter('highlight');
            syncUrl();
        });
        document.querySelectorAll('.id-pick').forEach(btn => {
            btn.addEventListener('click', () => {
                manager.itemPick(btn.dataset.id);
                updateCounter('highlight');
                syncUrl();
                filterInput.focus();
            });
        });

        const setMaxHeight = (val) => {
            updateCounter('mh');
            manager.setMaxHeight(val);
            maxHeightInput.value = val || '';
            syncUrl();
        };
        document.getElementById('set-max-height').addEventListener('click', () => setMaxHeight(maxHeightInput.value));
        document.querySelectorAll('.mh-preset').forEach(btn => {
            btn.addEventListener('click', () => setMaxHeight(btn.dataset.value));
        });

        const loadFromUrl = () => {
            const params = new URLSearchParams(window.location.search);
            const listName = params.get('l');
            const filter = params.get('f');
            const maxHeight = params.get('m');
            const selected = params.get('s');
            const highlight = params.get('h');

            if (maxHeight) setMaxHeight(maxHeight);
            if (filter) filterInput.value = filter;
            
            if (listName && lists[listName]) {
                activeListName = listName;
                const baseList = lists[listName];
                const selectedIds = new Set(selected ? selected.split(',') : []);
                currentList = baseList.map(i => ({ ...i, selected: selectedIds.has(String(i.id)) }));
            }

            applyFilter();
            if (highlight) manager.itemPick(highlight);
        };

        loadFromUrl();
    </script>
</body>
</html>
