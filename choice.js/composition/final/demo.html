<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SelectManager Demo</title>
    <link rel="stylesheet" href="../../floating-label-pattern.css" />
    <link rel="stylesheet" href="https://stopsopa.github.io/pages/js/popper/html-vanilla/popover.css" />
    <link rel="stylesheet" href="../select-section/SelectedListManager.css" />
    <link rel="stylesheet" href="../options-section/OptionListManager.css" />
    <style>
      .gcp-css {
        font-size: 13px !important;
        height: 32px !important;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        padding: 2rem;
        background-color: #f0f2f5;
        color: #333;
      }
      h1 {
        margin-bottom: 20px;
        font-weight: 300;
      }
      #instances-area {
        display: flex;
        flex-direction: column;
        gap: 30px;
      }
      .demo-section {
        background: white;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        border: 1px solid #ddd;
        position: relative;
      }
      .demo-section h2 {
        margin-top: 0;
        margin-bottom: 1.5rem;
        font-size: 1.1rem;
        color: #666;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .resizer-container {
        border: 1px dashed #ccc;
        margin-bottom: 15px;
        position: relative;
        background: #fafafa;
        min-height: 50px;
      }
      .controls {
        margin-top: 1.5rem;
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        align-items: center;
        padding-top: 1rem;
        border-top: 1px solid #eee;
      }
      .component-container {
        width: 100%;
        height: 100%;
        align-items: center;
        justify-content: center;
      }
      #init-btn {
        margin-bottom: 20px;
      }
      .destroy-btn {
        position: absolute;
        top: 1rem;
        right: 1rem;
      }
    </style>
  </head>
  <body>
    <h1>SelectManager Demo</h1>
    <button id="init-btn" class="gcp-css">Initialize New Instance</button> | 
    <a href="" id="reload-link">reload</a> | 
    <a href="../..">up ..</a>

    <div id="instances-area"></div>

    <script type="module">
      import "../../../js/CenterAndHeightResizer.js";
      import { SelectManager } from "./SelectManager.rendered.js";

      document.getElementById("reload-link").href = window.location.pathname;

      let instanceCounter = 0;

      const mockOptions = [
        { id: 1, label: "Apple" },
        { id: 2, label: "Banana" },
        { id: 3, label: "Cherry" },
        { id: 4, label: "Date" },
        { id: 5, label: "Elderberry" },
        { id: 6, label: "Fig" },
        { id: 7, label: "Grape" },
        { id: 8, label: "Honeydew" },
      ];

      const init = (config = {}) => {
        instanceCounter++;
        const id = instanceCounter;
        
        const section = document.createElement("div");
        section.className = "demo-section";
        section.innerHTML = `
          <h2>Instance #${id}</h2>
          <button class="gcp-css white destroy-btn" id="destroy-${id}">Destroy</button>
          <div class="resizer-container">
            <center-and-height-resizer id="resizer-${id}" left="20%" center="60%" height="60px">
              <div id="container-${id}" class="component-container"></div>
            </center-and-height-resizer>
          </div>
          <div class="controls">
            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 14px;">
              <input type="checkbox" id="disabled-${id}" ${config.disabled ? 'checked' : ''}> Disabled
            </label>
            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 14px;">
              <input type="checkbox" id="loading-${id}" ${config.loading ? 'checked' : ''}> Loading
            </label>
            <button class="gcp-css white" id="toggle-error-${id}">Toggle Error</button>
            <input type="text" id="label-input-${id}" placeholder="Set Label" class="gcp-css" style="padding: 0 10px; width: 100px;">
            <button class="gcp-css white" id="set-label-${id}">Set Label</button>
          </div>
          <div class="controls">
            <strong>Selected State:</strong>
            <pre id="dump-${id}" style="background: #f8f8f8; padding: 10px; border: 1px solid #eee; border-radius: 4px; font-size: 12px; flex: 1; margin: 0; max-height: 100px; overflow: auto;"></pre>
          </div>
        `;
        
        document.getElementById("instances-area").appendChild(section);
        
        const container = document.getElementById(`container-${id}`);
        const dump = document.getElementById(`dump-${id}`);
        
        const updateDump = (list) => {
          dump.textContent = JSON.stringify(list, null, 2);
        };

        const manager = new SelectManager(container, {
          selectOptions: {
            label: config.label || "Select Fruit",
            list: config.list || [],
            disabled: config.disabled || false,
            loading: config.loading || false,
            onDelete: (itemId) => {
              const newList = manager.selected.propList.filter(i => String(i.id) !== String(itemId));
              manager.selected.updateList(newList);
              updateDump(newList);
            }
          },
          optionOptions: {
            label: "Search fruit...",
            options: mockOptions,
            maxHeight: "250px",
            onItemPick: (item) => {
              manager.selected.updateList([item]);
              manager.container.hide();
              updateDump([item]);
            },
            onCancel: () => manager.container.hide(),
            onOk: () => manager.container.hide(),
          },
        });

        updateDump(config.list || []);

        document.getElementById(`disabled-${id}`).addEventListener("change", (e) => {
          manager.selected.setDisabled(e.target.checked);
        });

        document.getElementById(`loading-${id}`).addEventListener("change", (e) => {
          manager.selected.setLoading(e.target.checked);
        });

        document.getElementById(`toggle-error-${id}`).addEventListener("click", () => {
          const isError = manager.selected.propElement.classList.contains("error");
          manager.selected.setErrorState(!isError);
        });

        document.getElementById(`set-label-${id}`).addEventListener("click", () => {
          const val = document.getElementById(`label-input-${id}`).value;
          if (val) manager.selected.setLabel(val);
        });

        document.getElementById(`destroy-${id}`).addEventListener("click", () => {
          manager.destroy();
          section.remove();
        });

        return manager;
      };

      document.getElementById("init-btn").addEventListener("click", () => init());

    </script>
  </body>
</html>
