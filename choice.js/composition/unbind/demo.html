<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClickOutside Demo</title>
    <link rel="stylesheet" href="../../floating-label-pattern.css" />
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        padding: 20px;
        background: #f0f2f5;
        color: #333;
      }
      .box {
        width: 300px;
        height: 200px;
        background: white;
        border: 2px solid #ccc;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      }
      .box.active {
        border-color: #2196f3;
        box-shadow: 0 4px 15px rgba(33, 150, 243, 0.2);
      }
      .log {
        background: #333;
        color: #0f0;
        padding: 10px;
        font-family: monospace;
        border-radius: 4px;
        min-height: 150px;
      }
    </style>
  </head>
  <body class="gcp-css">
    <div style="padding: 20px">
    <h1>ClickOutside Demo</h1>
    <a href=".">up ..</a>
    
    <div style="display: flex; gap: 20px; margin-top: 20px;">
        <div>
            <div id="box1" class="box">
                <h3>Box 1</h3>
                <p>Click inside me: nothing happens.</p>
                <p>Click outside me: "Box 1 outside click" logged.</p>
                <button>Inner Button 1</button>
            </div>

            <div id="box2" class="box">
                <h3>Box 2</h3>
                <p>Click inside me: nothing happens.</p>
                <p>Click outside me: "Box 2 outside click" logged.</p>
                <button>Inner Button 2</button>
            </div>
        </div>
        
        <div style="flex: 1;">
            <h3>Event Log</h3>
            <button id="clear-log" style="margin-bottom: 10px;">Clear Log</button>
            <div id="log" class="log"></div>
        </div>
    </div>

    <script type="module">
      import { clickOutside } from "./clickOutside.js";

      const logEl = document.getElementById("log");
      const clearLogBtn = document.getElementById("clear-log");

      function logMessage(msg) {
        const div = document.createElement("div");
        const time = new Date().toISOString().split("T")[1].split(".")[0];
        div.textContent = `[${time}] ${msg}`;
        logEl.prepend(div);
      }

      clearLogBtn.addEventListener("click", () => {
        logEl.innerHTML = "";
      });

      const box1 = document.getElementById("box1");
      const box2 = document.getElementById("box2");

      clickOutside(box1, (e) => {
        logMessage("Box 1 outside click");
        box1.classList.remove("active");
      });
      box1.addEventListener("click", () => box1.classList.add("active"));

      clickOutside(box2, (e) => {
        logMessage("Box 2 outside click");
        box2.classList.remove("active");
      });
      box2.addEventListener("click", () => box2.classList.add("active"));
    </script>
    </div>
  </body>
</html>
