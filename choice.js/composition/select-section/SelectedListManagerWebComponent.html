<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SelectedListManager WebComponent Demo</title>
    <!-- Global CSS configuration for the SelectedList component -->
    <meta name="selected-list-css" content="SelectedListManager.css">
    <link rel="stylesheet" href="../../floating-label-pattern.css" />
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
      }
      .controls {
        margin-top: 20px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .demo-container {
        margin-top: 20px;
        padding: 20px;
        border: 1px dashed #ccc;
      }
      .demo-container label {
        display: flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
      }
    </style>
  </head>
  <body class="gcp-css">
    <div style="padding: 20px;">
    <h1>SelectedListManager WebComponent Demo</h1>
    <button id="init-btn">Initialize Component</button> | <a href="" id="reload-link">reload</a> |
    <a href=".">up ..</a>

    <div
      id="history-indicator"
      style="
        position: fixed;
        top: 10px;
        right: 10px;
        background: rgba(0, 0, 0, 0.8);
        color: #fff;
        padding: 10px;
        border-radius: 8px;
        font-size: 12px;
        z-index: 1000;
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(5px);
      "
    >
      <span id="history-time" style="font-family: monospace; opacity: 0.8">No history entry</span>
      <button
        id="push-btn"
        style="
          cursor: pointer;
          background: #444;
          color: #fff;
          border: none;
          padding: 4px 8px;
          border-radius: 4px;
          font-weight: bold;
          transition: background 0.2s;
        "
      >
        Push State
      </button>
    </div>

    <div id="instances-area"></div>

    <script type="module">
      import "../../../js/CenterResizer.js";
      import "./selected-list.js";

      document.getElementById("reload-link").href = window.location.pathname;

      // Global history logic
      let pushTimeout = null;
      const historyTime = document.getElementById("history-time");
      const pushBtn = document.getElementById("push-btn");
      const updateHistoryIndicator = () => {
        const now = new Date();
        historyTime.textContent =
          "Last push: " +
          now.getHours().toString().padStart(2, "0") +
          ":" +
          now.getMinutes().toString().padStart(2, "0") +
          ":" +
          now.getSeconds().toString().padStart(2, "0");
        pushBtn.style.background = "#28a745";
        setTimeout(() => (pushBtn.style.background = "#444"), 500);
      };
      const pushHistory = () => {
        if (pushTimeout) clearTimeout(pushTimeout);
        window.history.pushState({}, "", window.location.href);
        updateHistoryIndicator();
      };
      const debouncedPush = () => {
        if (pushTimeout) clearTimeout(pushTimeout);
        pushTimeout = setTimeout(pushHistory, 3000);
      };
      pushBtn.addEventListener("click", pushHistory);

      let globalIdCounter = 1;
      let instanceCounter = 0;

      const init = (initialList = [], resizerLeft = "50px", resizerCenter = "450px", states = {}) => {
        instanceCounter++;
        const instanceId = instanceCounter;

        let localList = initialList;

        const syncUrl = () => {
          const url = new URL(window.location);
          url.searchParams.delete(`v${instanceId}`);
          localList.forEach((item) => {
            const val =
              item.color || item.img ? [item.color || "", item.img || "", item.label || ""].join("|") : item.label;
            url.searchParams.append(`v${instanceId}`, val);
          });

          const resizer = group.querySelector("center-resizer");
          if (resizer) {
            url.searchParams.set(`l${instanceId}`, resizer.getAttribute("left") || "50px");
            url.searchParams.set(`c${instanceId}`, resizer.getAttribute("center") || "350px");
          }

          const errorCb = group.querySelector('[data-role="error-cb"]');
          const disabledCb = group.querySelector('[data-role="disabled-cb"]');
          const loadingCb = group.querySelector('[data-role="loading-cb"]');
          const inputFieldCb = group.querySelector('[data-role="input-field-cb"]');

          if (errorCb) url.searchParams.set(`e${instanceId}`, errorCb.checked ? "1" : "0");
          if (disabledCb) url.searchParams.set(`d${instanceId}`, disabledCb.checked ? "1" : "0");
          if (loadingCb) url.searchParams.set(`o${instanceId}`, loadingCb.checked ? "1" : "0");
          if (inputFieldCb) url.searchParams.set(`i${instanceId}`, inputFieldCb.checked ? "1" : "0");

          window.history.replaceState({}, "", url);
          debouncedPush();
        };

        // Update globalIdCounter based on loaded list
        localList.forEach((item) => {
          if (item.id >= globalIdCounter) {
            globalIdCounter = item.id + 1;
          }
        });

        // Build the DOM group
        const group = document.createElement("div");
        group.className = "demo-container";

        group.innerHTML = `
                <center-resizer id="resizer-${instanceId}" left="${resizerLeft}" center="${resizerCenter}">
                    <selected-list 
                        id="sl-${instanceId}" 
                        data-test="example"
                        label="Select options"
                        ${states.error ? "error" : ""}
                        ${states.disabled ? "disabled" : ""}
                        ${states.loading ? "loading" : ""}
                        show-input="${states.showInput !== false}"
                    ></selected-list>
                </center-resizer>

                <div style="margin-top: 10px; margin-bottom: 20px;">
                    Input Value: <pre data-role="input-value-out" id="input-value-out-${instanceId}" style="display: inline; background: #eee; padding: 2px 5px;"></pre>
                    (onChange triggers: <span data-role="onchange-counter" id="onchange-counter-${instanceId}" style="font-weight: bold;">0</span>,
                    onFocus triggers: <span data-role="onfocus-counter" id="onfocus-counter-${instanceId}" style="font-weight: bold;">0</span>,
                    last key: <span data-role="last-key" id="last-key-${instanceId}" style="font-weight: bold; color: #d11;">-</span>)
                </div>

                <div class="controls">
                    <div class="input-wrapper" style="max-width: 300px; margin-bottom: 0;">
                        <input type="text" data-role="new-item-input" id="new-item-input-${instanceId}" placeholder=" ">
                        <label for="new-item-input-${instanceId}">New item label</label>
                    </div>
                    <button data-role="add-btn" id="add-btn-${instanceId}">Add Item</button>
                </div>

                <div class="controls" style="margin-top: 20px;">
                    <div class="checkbox-wrapper" style="margin-bottom: 0;">
                        <div class="checkbox-row">
                            <input type="checkbox" data-role="error-cb" id="error-cb-${instanceId}" ${states.error ? "checked" : ""}>
                            <div class="content-cell">
                                <label for="error-cb-${instanceId}">Error State</label>
                            </div>
                        </div>
                    </div>
                    <div class="checkbox-wrapper" style="margin-bottom: 0;">
                        <div class="checkbox-row">
                            <input type="checkbox" data-role="disabled-cb" id="disabled-cb-${instanceId}" ${states.disabled ? "checked" : ""}>
                            <div class="content-cell">
                                <label for="disabled-cb-${instanceId}">Disabled State</label>
                            </div>
                        </div>
                    </div>
                    <div class="checkbox-wrapper" style="margin-bottom: 0;">
                        <div class="checkbox-row">
                            <input type="checkbox" data-role="loading-cb" id="loading-cb-${instanceId}" ${states.loading ? "checked" : ""}>
                            <div class="content-cell">
                                <label for="loading-cb-${instanceId}">Loading State</label>
                            </div>
                        </div>
                    </div>
                    <div class="checkbox-wrapper" style="margin-bottom: 0;">
                        <div class="checkbox-row">
                            <input type="checkbox" data-role="input-field-cb" id="input-field-cb-${instanceId}" ${states.showInput !== false ? "checked" : ""}>
                            <div class="content-cell">
                                <label for="input-field-cb-${instanceId}">Show Input Field</label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="controls" style="margin-top: 20px;">
                    <div class="input-wrapper" style="max-width: 300px; margin-bottom: 0;">
                        <input type="text" data-role="inject-label-value" id="inject-label-value-${instanceId}" placeholder=" ">
                        <label for="inject-label-value-${instanceId}">Inject label value</label>
                    </div>
                    <button data-role="inject-label-btn" id="inject-label-btn-${instanceId}">Set Label Value</button>
                </div>

                <div class="controls" style="margin-top: 20px;">
                    <pre data-role="list-dump" style="background: #f9f9f9; border: 1px solid #ddd; padding: 10px; width: 100%; box-sizing: border-box; overflow: auto;"></pre>
                </div>
            `;

        document.getElementById("instances-area").appendChild(group);

        const sl = group.querySelector("selected-list");
        const inputValueOut = group.querySelector('[data-role="input-value-out"]');
        const newItemInput = group.querySelector('[data-role="new-item-input"]');
        const addBtn = group.querySelector('[data-role="add-btn"]');
        const errorCb = group.querySelector('[data-role="error-cb"]');
        const disabledCb = group.querySelector('[data-role="disabled-cb"]');
        const loadingCb = group.querySelector('[data-role="loading-cb"]');
        const inputFieldCb = group.querySelector('[data-role="input-field-cb"]');
        const injectLabelInput = group.querySelector('[data-role="inject-label-value"]');
        const injectLabelBtn = group.querySelector('[data-role="inject-label-btn"]');
        const onChangeCounter = group.querySelector('[data-role="onchange-counter"]');
        const onFocusCounter = group.querySelector('[data-role="onfocus-counter"]');
        const lastKeyOut = group.querySelector('[data-role="last-key"]');
        const listDump = group.querySelector('[data-role="list-dump"]');
        let counter = 0;
        let focusCounter = 0;

        const updateDump = () => {
          const list = sl.selected;
          if (list.length === 0) {
            listDump.textContent = "[]";
            return;
          }
          listDump.textContent = "[\n" + list.map((item) => "  " + JSON.stringify(item)).join(",\n") + "\n]";
        };

        // Initialize list
        sl.selected = localList;

        // Register events
        sl.addEventListener("onDelete", (e) => {
          localList = localList.filter((item) => String(item.id) !== String(e.detail.id));
          sl.setSelected(localList);
          syncUrl();
          updateDump();
        });

        sl.addEventListener("onClear", () => {
          localList = [];
          sl.setSelected(localList);
          syncUrl();
          updateDump();
        });

        sl.addEventListener("onChange", (e) => {
          inputValueOut.textContent = e.detail.value;
          onChangeCounter.textContent = ++counter;
          // lastKeyOut.textContent = e.detail.key || "-";
          lastKeyOut.textContent = e.detail.key || typeof e.detail.key;

          const originalEvent = e.detail.originalEvent;
          if (originalEvent.type === "keydown") {
            if (originalEvent.key === "Enter" && e.detail.value.trim() !== "") {
              localList.push({ id: globalIdCounter++, label: e.detail.value.trim() });
              sl.setValue("");
              sl.setSelected(localList);
              syncUrl();
              updateDump();
              return;
            }

            if (originalEvent.key === "Backspace" && e.detail.value === "" && localList.length > 0) {
              localList.pop();
              sl.setSelected(localList);
              syncUrl();
              updateDump();
              return;
            }
          }
        });

        sl.addEventListener("onFocus", (e) => {
          onFocusCounter.textContent = ++focusCounter;
        });

        updateDump();

        if (
          (localList.length > 0 ||
            resizerLeft !== "50px" ||
            resizerCenter !== "350px" ||
            states.error ||
            states.disabled ||
            states.loading ||
            states.showInput === false) &&
          instanceId > 0
        ) {
          syncUrl();
        }

        addBtn.addEventListener("click", () => {
          let val = newItemInput.value.trim();
          let usedInternal = false;

          if (!val && sl.value) {
            val = sl.value.trim();
            usedInternal = true;
          }

          newItemInput.value = "";

          if (val) {
            localList.push({ id: globalIdCounter++, label: val });
            sl.setSelected(localList);
            syncUrl();
            updateDump();

            if (usedInternal) {
              sl.setValue("");
              inputValueOut.textContent = "";
            }
          }
        });

        errorCb.addEventListener("change", (e) => {
          sl.setErrorState(e.target.checked);
          syncUrl();
        });

        disabledCb.addEventListener("change", (e) => {
          sl.setDisabled(e.target.checked);
          syncUrl();
        });

        loadingCb.addEventListener("change", (e) => {
          sl.setLoading(e.target.checked);
          syncUrl();
        });

        inputFieldCb.addEventListener("change", (e) => {
          sl.setShowInput(e.target.checked);
          syncUrl();
        });

        injectLabelBtn.addEventListener("click", () => {
          sl.setLabel(injectLabelInput.value);
          injectLabelInput.value = "";
        });

        // Watch resizer changes
        const resizer = group.querySelector("center-resizer");
        resizer.addEventListener("onLeft", () => syncUrl());
        resizer.addEventListener("onCenter", () => syncUrl());
      };

      document.getElementById("init-btn").addEventListener("click", () => init());

      const loadFromUrl = () => {
        const instancesArea = document.getElementById("instances-area");
        instancesArea.innerHTML = "";
        instanceCounter = 0;
        globalIdCounter = 1;

        const urlParams = new URLSearchParams(window.location.search);
        const groups = {};
        const resizerData = {};
        const statesData = {};

        for (const [key, value] of urlParams.entries()) {
          const match = key.match(/^([vlcdeoi])(\d+)$/);
          if (match) {
            const [, type, id] = match;
            if (type === "v") {
              if (!groups[id]) groups[id] = [];
              groups[id].push(value);
            } else if (type === "l" || type === "c") {
              if (!resizerData[id]) resizerData[id] = {};
              resizerData[id][type === "l" ? "left" : "center"] = value;
            } else {
              if (!statesData[id]) statesData[id] = {};
              const map = { e: "error", d: "disabled", o: "loading", i: "showInput" };
              statesData[id][map[type]] = value === "1";
            }
          }
        }

        const allIds = Array.from(
          new Set([...Object.keys(groups), ...Object.keys(resizerData), ...Object.keys(statesData)]),
        ).sort((a, b) => parseInt(a) - parseInt(b));

        allIds.forEach((id) => {
          const list = (groups[id] || []).map((v) => {
            const parts = v.split("|");
            if (parts.length === 3) {
              return {
                id: globalIdCounter++,
                color: parts[0] || undefined,
                img: parts[1] || undefined,
                label: parts[2],
              };
            }
            return { id: globalIdCounter++, label: v };
          });
          const left = resizerData[id]?.left || "50px";
          const center = resizerData[id]?.center || "350px";
          init(list, left, center, statesData[id] || {});
        });
      };

      window.addEventListener("popstate", loadFromUrl);
      loadFromUrl();
    </script>
    </div>
  </body>
</html>
