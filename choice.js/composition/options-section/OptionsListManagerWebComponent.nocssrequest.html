<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OptionsList WebComponent Attributes Demo</title>
    <link rel="stylesheet" href="../../floating-label-pattern.css" />
    <!-- No meta tag or link tag here because we are injecting CSS via JS to avoid extra requests -->
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        padding: 20px;
        background: #f0f2f5;
        color: #333;
      }
      h1 {
        margin-bottom: 20px;
        font-weight: 300;
      }
      #instances-area {
        display: flex;
        flex-direction: column;
        gap: 30px;
      }
      .demo-container {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        border: 1px solid #ddd;
      }
      .resizer-container {
        border: 1px dashed #ccc;
        margin-bottom: 15px;
        position: relative;
        background: #fafafa;
      }
      .controls {
        margin-top: 15px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        padding-top: 15px;
        border-top: 1px solid #eee;
      }
      .controls strong {
        font-size: 14px;
        color: #666;
      }
      pre {
        background: #f8f8f8;
        padding: 12px;
        border: 1px solid #eee;
        border-radius: 4px;
        font-size: 12px;
        max-height: 150px;
        overflow: auto;
        width: 100%;
        box-sizing: border-box;
        margin-top: 10px;
      }
      #init-btn {
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <h1>Load CSS in esm</h1>
    <ace-editor lang="javascript">
      <script type="ace">

        import { OptionsList } from "./options-list.js";

        // 1. If using a bundler like Vite/Webpack:
        // OptionsList.cssText = (await import("./OptionsListManager.css?raw")).default;

        const css1 = await fetch("../../floating-label-pattern.css").then(r => r.text());
        // where floating-label-pattern.css is not needed really, but is here to show how to load multiple css files

        const css2 = await fetch("./OptionsListManager.css").then(r => r.text());
        OptionsList.cssText = css1 + "\n" + css2;
      </script>
    </ace-editor>
    <hr />
    <button id="init-btn" class="gcp-css">Initialize Component</button> | <a href="" id="reload-link">reload</a> |
    <a href=".">up ..</a>

    <div
      id="history-indicator"
      style="
        position: fixed;
        top: 10px;
        right: 10px;
        background: rgba(0, 0, 0, 0.8);
        color: #fff;
        padding: 10px;
        border-radius: 8px;
        font-size: 12px;
        z-index: 1000;
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(5px);
      "
    >
      <span id="history-time" style="font-family: monospace; opacity: 0.8">No history entry</span>
      <button
        id="push-btn"
        style="
          cursor: pointer;
          background: #444;
          color: #fff;
          border: none;
          padding: 4px 8px;
          border-radius: 4px;
          font-weight: bold;
          transition: background 0.2s;
        "
      >
        Push State
      </button>
    </div>

    <div id="instances-area"></div>

    <script type="module">
      import "../../../js/CenterAndHeightResizer.js";
      import { OptionsList } from "./options-list.js";

      // 1. If using a bundler like Vite/Webpack:
      // OptionsList.cssText = (await import("./OptionsListManager.css?raw")).default;
      const css1 = await fetch("../../floating-label-pattern.css").then((r) => r.text());
      const css2 = await fetch("./OptionsListManager.css").then((r) => r.text());
      OptionsList.cssText = css1 + "\n" + css2;

      document.getElementById("reload-link").href = window.location.pathname;

      // Global history logic
      let pushTimeout = null;
      const historyTime = document.getElementById("history-time");
      const pushBtn = document.getElementById("push-btn");
      const updateHistoryIndicator = () => {
        const now = new Date();
        historyTime.textContent =
          "Last push: " +
          now.getHours().toString().padStart(2, "0") +
          ":" +
          now.getMinutes().toString().padStart(2, "0") +
          ":" +
          now.getSeconds().toString().padStart(2, "0");
        pushBtn.style.background = "#28a745";
        setTimeout(() => (pushBtn.style.background = "#444"), 500);
      };
      const pushHistory = () => {
        if (pushTimeout) clearTimeout(pushTimeout);
        window.history.pushState({}, "", window.location.href);
        updateHistoryIndicator();
      };
      const debouncedPush = () => {
        if (pushTimeout) clearTimeout(pushTimeout);
        pushTimeout = setTimeout(pushHistory, 3000);
      };
      pushBtn.addEventListener("click", pushHistory);

      let instanceCounter = 0;

      const init = (initialOptions = [], states = {}) => {
        instanceCounter++;
        const instanceId = instanceCounter;

        let localOptions = [...initialOptions];

        const maxHeightPresets = ["200px", "300px", "400px", "600px", ""];
        const group = document.createElement("div");
        group.className = "demo-container";

        group.innerHTML = `
                <h3>Instance #${instanceId}</h3>
                <div class="resizer-container">
                    <center-and-height-resizer 
                        id="resizer-${instanceId}" 
                        left="${states.left || "50px"}" 
                        center="${states.center || "350px"}" 
                        ${states.height ? `height="${states.height}"` : ""}
                    >
                        <options-list 
                            id="ol-${instanceId}" 
                            label="${states.label || "Search via attrs..."}"
                            ${states.loading ? "loading" : ""}
                            ${states.disabled ? "disabled" : ""}
                            value="${states.value || ""}"
                            max-height="${states.maxHeight || ""}"
                            show-footer="${states.showFooter !== false}"
                            show-filter="${states.showFilter !== false}"
                            options='${JSON.stringify(localOptions)}'
                            onInputChange="this.handleDemoInputChange(event)"
                            onItemPick="this.handleDemoItemClick(event)"
                            onOk="this.handleDemoOk(event)"
                            onCancel="this.handleDemoCancel(event)"
                            onHighlightChange="this.handleDemoHighlightChange(event)"
                        ></options-list>
                    </center-and-height-resizer>
                </div>

                <div class="controls">
                    <strong>Search Value:</strong> 
                    <pre data-role="search-val-out" style="display: inline; padding: 2px 5px; margin: 0; background: #eee; width: auto; max-height: none;">-</pre>
                    (onInputChange triggers: <span data-role="onchange-count" style="font-weight: bold;">0</span>,
                    onOk triggers: <span data-role="onok-count" style="font-weight: bold;">0</span>,
                    onCancel triggers: <span data-role="oncancel-count" style="font-weight: bold;">0</span>,
                    onItemPick triggers: <span data-role="onpick-count" style="font-weight: bold;">0</span>,
                    onHighlightChange triggers: <span data-role="onhighlight-count" style="font-weight: bold;">0</span>)
                </div>

                <div class="controls">
                    <button class="gcp-css" data-role="add-btn">Add Random Option</button>
                    <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 14px;">
                        <input type="checkbox" data-role="loading-cb"> Loading Spinner
                    </label>
                    <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 14px;">
                        <input type="checkbox" data-role="disabled-cb"> Disabled State
                    </label>
                    <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 14px;">
                        <input type="checkbox" data-role="footer-cb" checked> Show Footer
                    </label>
                    <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 14px;">
                        <input type="checkbox" data-role="filter-cb" checked> Show Filter
                    </label>
                    <button class="gcp-css white" data-role="focus-btn">Focus Input (via Method)</button>
                    <button class="gcp-css white" data-role="empty-btn">Set Custom Empty (Attr)</button>
                    <button class="gcp-css white" data-role="reset-empty-btn">Reset Empty</button>
                    <button class="gcp-css white" data-role="render-btn">Set Custom Render (Attr)</button>
                    <button class="gcp-css white" data-role="reset-render-btn">Reset Render</button>
                    <button class="gcp-css white" data-role="clear-btn">Clear Options</button>
                    <button class="gcp-css white" data-role="attach-window-btn">Attach Arrows to Window</button>
                    <button class="gcp-css white" data-role="detach-window-btn">Detach Arrows from Window</button>
                </div>

                <div class="controls">
                    <div style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">
                        <div style="display: flex; gap: 5px; align-items: center;">
                            <input type="text" data-role="inject-input" placeholder="Value..." style="padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; width: 80px;">
                            <button class="gcp-css" data-role="inject-btn">Set Value</button>
                        </div>
                        <div style="display: flex; gap: 5px; align-items: center;">
                            <input type="text" data-role="inject-label" placeholder="Label..." style="padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; width: 80px;">
                            <button class="gcp-css" data-role="inject-label-btn">Set Label</button>
                        </div>
                        <div style="display: flex; gap: 5px; align-items: center;" data-role="mh-presets-container">
                            <div style="display: flex; gap: 2px;">
                                <button class="gcp-css white" data-role="maxheight-down" style="padding: 0 8px; min-width: auto;">▼</button>
                                <input type="text" data-role="maxheight-input" placeholder="Max height..." style="padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; width: 80px;">
                                <button class="gcp-css white" data-role="maxheight-up" style="padding: 0 8px; min-width: auto;">▲</button>
                            </div>
                            <button class="gcp-css" data-role="maxheight-btn">Set</button>
                            ${maxHeightPresets.map((val) => `<button class="gcp-css white" data-role="mh-preset" data-value="${val}">${val || "Reset"}</button>`).join("")}
                        </div>
                    </div>
                </div>

                <div class="controls">
                    <strong>Options State Dump:</strong>
                    <pre data-role="options-dump"></pre>
                </div>
            `;

        document.getElementById("instances-area").appendChild(group);

        const ol = group.querySelector("options-list");
        const resizer = group.querySelector("center-and-height-resizer");
        const searchValOut = group.querySelector('[data-role="search-val-out"]');
        const onChangeCountOut = group.querySelector('[data-role="onchange-count"]');
        const onOkCountOut = group.querySelector('[data-role="onok-count"]');
        const onCancelCountOut = group.querySelector('[data-role="oncancel-count"]');
        const onPickCountOut = group.querySelector('[data-role="onpick-count"]');
        const onHighlightCountOut = group.querySelector('[data-role="onhighlight-count"]');
        const optionsDump = group.querySelector('[data-role="options-dump"]');

        const addBtn = group.querySelector('[data-role="add-btn"]');
        const loadingCb = group.querySelector('[data-role="loading-cb"]');
        const disabledCb = group.querySelector('[data-role="disabled-cb"]');
        const footerCb = group.querySelector('[data-role="footer-cb"]');
        const filterCb = group.querySelector('[data-role="filter-cb"]');
        const focusBtn = group.querySelector('[data-role="focus-btn"]');
        const emptyBtn = group.querySelector('[data-role="empty-btn"]');
        const resetEmptyBtn = group.querySelector('[data-role="reset-empty-btn"]');
        const renderBtn = group.querySelector('[data-role="render-btn"]');
        const resetRenderBtn = group.querySelector('[data-role="reset-render-btn"]');
        const clearBtn = group.querySelector('[data-role="clear-btn"]');
        const attachWindowBtn = group.querySelector('[data-role="attach-window-btn"]');
        const detachWindowBtn = group.querySelector('[data-role="detach-window-btn"]');
        const injectInput = group.querySelector('[data-role="inject-input"]');
        const injectBtn = group.querySelector('[data-role="inject-btn"]');
        const injectLabelInput = group.querySelector('[data-role="inject-label"]');
        const injectLabelBtn = group.querySelector('[data-role="inject-label-btn"]');
        const maxHeightInput = group.querySelector('[data-role="maxheight-input"]');
        const maxHeightBtn = group.querySelector('[data-role="maxheight-btn"]');

        let onChangeCounter = 0;
        let onOkCounter = 0;
        let onCancelCounter = 0;
        let onPickCounter = 0;
        let onHighlightCounter = 0;

        const syncUrl = () => {
          const url = new URL(window.location);
          url.searchParams.delete(`v${instanceId}`);
          localOptions.forEach((item) => {
            const val = [item.id, item.label, item.selected ? "1" : "0"].join("|");
            url.searchParams.append(`v${instanceId}`, val);
          });

          if (resizer) {
            url.searchParams.set(`l${instanceId}`, resizer.getAttribute("left") || "50px");
            url.searchParams.set(`c${instanceId}`, resizer.getAttribute("center") || "350px");
            const h = resizer.getAttribute("height");
            if (h) {
              url.searchParams.set(`h${instanceId}`, h);
            } else {
              url.searchParams.delete(`h${instanceId}`);
            }
          }

          url.searchParams.set(`o${instanceId}`, loadingCb.checked ? "1" : "0");
          url.searchParams.set(`d${instanceId}`, disabledCb.checked ? "1" : "0");
          url.searchParams.set(`f${instanceId}`, footerCb.checked ? "1" : "0");
          url.searchParams.set(`e${instanceId}`, filterCb.checked ? "1" : "0");
          url.searchParams.set(`m${instanceId}`, ol.getAttribute("max-height") || "");
          url.searchParams.set(`s${instanceId}`, searchValOut.textContent === "-" ? "" : searchValOut.textContent);
          url.searchParams.set(`a${instanceId}`, injectLabelInput.value || "");
          url.searchParams.set(`y${instanceId}`, ol.highlight || "");

          window.history.replaceState({}, "", url);
          debouncedPush();
        };

        const updateDump = () => {
          const optAttr = ol.getAttribute("options");
          try {
            const opts = optAttr ? JSON.parse(optAttr) : [];
            optionsDump.textContent = JSON.stringify(opts, null, 2);
          } catch (e) {
            optionsDump.textContent = "Error parsing options attribute";
          }
        };

        // Events via inline attributes (assigned to element instance for 'this' context in web component logic)
        ol.handleDemoInputChange = (e) => {
          const val = e.detail.value;
          onChangeCounter++;
          onChangeCountOut.textContent = onChangeCounter;
          searchValOut.textContent = val || "-";
          syncUrl();
        };

        ol.handleDemoItemClick = (e) => {
          onPickCounter++;
          onPickCountOut.textContent = onPickCounter;
          const item = e.detail.item;
          localOptions = localOptions.map((opt) => {
            if (opt.id === item.id) return { ...opt, selected: !opt.selected };
            return opt;
          });
          ol.setAttribute("options", JSON.stringify(localOptions));
          updateDump();
          syncUrl();
        };

        ol.handleDemoOk = () => {
          onOkCounter++;
          onOkCountOut.textContent = onOkCounter;
        };

        ol.handleDemoCancel = () => {
          onCancelCounter++;
          onCancelCountOut.textContent = onCancelCounter;
        };

        ol.handleDemoHighlightChange = (e) => {
          onHighlightCounter++;
          onHighlightCountOut.textContent = onHighlightCounter;
          syncUrl();
        };

        // Handlers
        addBtn.addEventListener("click", () => {
          const id = Math.floor(Math.random() * 100000);
          localOptions.push({ id, label: "Attr Option " + id });
          ol.setAttribute("options", JSON.stringify(localOptions));
          updateDump();
          syncUrl();
        });

        loadingCb.addEventListener("change", (e) => {
          ol.toggleAttribute("loading", e.target.checked);
          syncUrl();
        });

        disabledCb.addEventListener("change", (e) => {
          ol.toggleAttribute("disabled", e.target.checked);
          syncUrl();
        });

        footerCb.addEventListener("change", (e) => {
          ol.setAttribute("show-footer", e.target.checked ? "true" : "false");
          syncUrl();
        });

        filterCb.addEventListener("change", (e) => {
          ol.setAttribute("show-filter", e.target.checked ? "true" : "false");
          syncUrl();
        });

        focusBtn.addEventListener("click", () => ol.setFocus()); // Method is needed for focus

        emptyBtn.addEventListener("click", () => {
          ol.setRenderEmpty(
            () =>
              '<div style="padding: 30px; text-align: center; background: #fff5f5; border: 2px dashed #ffcccc; border-radius: 8px; color: #e53e3e; font-weight: bold;"><div style="font-size: 24px; margin-bottom: 10px;">🏜️</div>Nothing found...</div>',
          );
        });

        resetEmptyBtn.addEventListener("click", () => {
          ol.setRenderEmpty();
        });

        renderBtn.addEventListener("click", () => {
          ol.setRenderItem((item) => {
            return `<div style="display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-left: 4px solid ${item.selected ? "#3182ce" : "transparent"}; background: ${item.selected ? "#ebf8ff" : "white"}; margin-bottom: 4px; border-radius: 0 4px 4px 0;"><span style="font-size: 18px;">${item.selected ? "✅" : "⬜"}</span><label style="flex-grow: 1; cursor: pointer;">${item.label}</label>${item.selected ? '<span style="font-size: 12px; color: #3182ce; font-weight: bold;">SELECTED</span>' : ""}</div>`;
          });
        });

        resetRenderBtn.addEventListener("click", () => {
          ol.setRenderItem();
        });

        clearBtn.addEventListener("click", () => {
          localOptions = [];
          ol.setAttribute("options", "[]");
          updateDump();
          syncUrl();
        });

        attachWindowBtn.addEventListener("click", () => {
          ol.attachArrowsUpAndDown(window);
        });

        detachWindowBtn.addEventListener("click", () => {
          ol.detachArrowsUpAndDown(window);
        });

        injectBtn.addEventListener("click", () => {
          ol.setAttribute("value", injectInput.value);
          searchValOut.textContent = injectInput.value || "-";
          syncUrl();
        });

        injectInput.addEventListener("input", () => syncUrl());

        injectLabelInput.addEventListener("input", () => syncUrl());
        injectLabelBtn.addEventListener("click", () => {
          ol.setAttribute("label", injectLabelInput.value);
          syncUrl();
        });

        const setMH = (val) => {
          maxHeightInput.value = val || "";
          ol.setAttribute("max-height", val || "");
          syncUrl();
        };
        maxHeightBtn.addEventListener("click", () => setMH(maxHeightInput.value));
        group.querySelectorAll('[data-role="mh-preset"]').forEach((btn) => {
          btn.addEventListener("click", () => setMH(btn.dataset.value));
        });

        const stepMH = (delta) => {
          let current = parseInt(maxHeightInput.value) || 0;
          current += delta;
          if (current < 0) current = 0;
          setMH(current + "px");
        };

        group.querySelector('[data-role="maxheight-up"]').addEventListener("click", () => stepMH(10));
        group.querySelector('[data-role="maxheight-down"]').addEventListener("click", () => stepMH(-10));

        // Watch resizer changes
        resizer.addEventListener("onLeft", () => syncUrl());
        resizer.addEventListener("onCenter", () => syncUrl());
        resizer.addEventListener("onHeight", () => syncUrl());

        updateDump();
        if (states.loading) loadingCb.checked = true;
        if (states.disabled) disabledCb.checked = true;
        footerCb.checked = states.showFooter !== false;
        filterCb.checked = states.showFilter !== false;
        if (states.value) {
          searchValOut.textContent = states.value;
          injectInput.value = states.value;
        }
        if (states.label) {
          injectLabelInput.value = states.label;
        }
        if (states.maxHeight) {
          maxHeightInput.value = states.maxHeight;
        }

        if (
          (localOptions.length > 0 ||
            states.loading ||
            states.disabled ||
            states.showFooter === false ||
            states.showFilter === false ||
            states.value ||
            states.height ||
            states.left ||
            states.center) &&
          instanceId > 0
        ) {
          syncUrl();
        }

        if (states.highlight) {
          ol.itemPick(states.highlight);
        }
      };

      document.getElementById("init-btn").addEventListener("click", () => {
        init([
          { id: 301, label: "Attr Item A" },
          { id: 302, label: "Attr Item B", selected: true },
        ]);
      });

      const loadFromUrl = () => {
        const instancesArea = document.getElementById("instances-area");
        instancesArea.innerHTML = "";
        instanceCounter = 0;

        const urlParams = new URLSearchParams(window.location.search);
        const groups = {};
        const statesData = {};

        for (const [key, value] of urlParams.entries()) {
          const match = key.match(/^([voshlcamfedy])(\d+)$/);
          if (match) {
            const [, type, id] = match;
            if (type === "v") {
              if (!groups[id]) groups[id] = [];
              groups[id].push(value);
            } else {
              if (!statesData[id]) statesData[id] = {};
              const map = {
                o: "loading",
                d: "disabled",
                m: "maxHeight",
                f: "showFooter",
                e: "showFilter",
                s: "value",
                h: "height",
                l: "left",
                c: "center",
                a: "label",
                y: "highlight",
              };
              statesData[id][map[type]] =
                type === "o" || type === "d" || type === "f" || type === "e" ? value === "1" : value;
            }
          }
        }

        const allIds = Array.from(new Set([...Object.keys(groups), ...Object.keys(statesData)])).sort(
          (a, b) => parseInt(a) - parseInt(b),
        );

        allIds.forEach((id) => {
          const options = (groups[id] || []).map((v) => {
            const parts = v.split("|");
            if (parts.length === 3) {
              return { id: parts[0], label: parts[1], selected: parts[2] === "1" };
            }
            return { id: Math.random().toString(36).substr(2, 9), label: v };
          });
          init(options, statesData[id] || {});
        });
      };

      window.addEventListener("popstate", loadFromUrl);
      loadFromUrl();
    </script>
    <script
      type="module"
      src="https://stopsopa.github.io/ace-editor-webcomponent/ace-web-component.js"
      data-main-ace="https://stopsopa.github.io/ace-editor-webcomponent/noprettier/ace/ace-builds-1.43.4/src-min-noconflict/ace.js"
    ></script>
  </body>
</html>
