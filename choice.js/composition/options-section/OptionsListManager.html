<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OptionsListManager Demo</title>
    <link rel="stylesheet" href="../../floating-label-pattern.css" />
    <link rel="stylesheet" href="OptionsListManager.css" />
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        padding: 20px;
        background: #f0f2f5;
        color: #333;
      }
      h1 {
        margin-bottom: 20px;
        font-weight: 300;
      }
      #instances-area {
        display: flex;
        flex-direction: column;
        gap: 30px;
      }
      .demo-container {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        border: 1px solid #ddd;
      }
      .resizer-container {
        border: 1px dashed #ccc;
        margin-bottom: 15px;
        position: relative;
        background: #fafafa;
      }
      .controls {
        margin-top: 15px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        padding-top: 15px;
        border-top: 1px solid #eee;
      }
      .controls strong {
        font-size: 14px;
        color: #666;
      }
      pre {
        background: #f8f8f8;
        padding: 12px;
        border: 1px solid #eee;
        border-radius: 4px;
        font-size: 12px;
        max-height: 150px;
        overflow: auto;
        width: 100%;
        box-sizing: border-box;
        margin-top: 10px;
      }
      #init-btn {
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body class="gcp-css">
    <div style="padding: 20px;">
    <h1>OptionsListManager Demo</h1>
    <button id="init-btn">Initialize New Instance</button> | <a href="" id="reload-link">reload</a> |
    <a href=".">up ..</a>

    <div
      id="history-indicator"
      style="
        position: fixed;
        top: 10px;
        right: 10px;
        background: rgba(0, 0, 0, 0.8);
        color: #fff;
        padding: 10px;
        border-radius: 8px;
        font-size: 12px;
        z-index: 1000;
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(5px);
      "
    >
      <span id="history-time" style="font-family: monospace; opacity: 0.8">No history entry</span>
      <button
        id="push-btn"
        style="
          cursor: pointer;
          background: #444;
          color: #fff;
          border: none;
          padding: 4px 8px;
          border-radius: 4px;
          font-weight: bold;
          transition: background 0.2s;
        "
      >
        Push State
      </button>
    </div>

    <div id="instances-area"></div>

    <script type="module">
      import "../../../js/CenterAndHeightResizer.js";
      import { OptionsListManager } from "./OptionsListManager.js";

      document.getElementById("reload-link").href = window.location.pathname;

      // Global history logic
      let pushTimeout = null;
      const historyTime = document.getElementById("history-time");
      const pushBtn = document.getElementById("push-btn");
      const updateHistoryIndicator = () => {
        const now = new Date();
        historyTime.textContent =
          "Last push: " +
          now.getHours().toString().padStart(2, "0") +
          ":" +
          now.getMinutes().toString().padStart(2, "0") +
          ":" +
          now.getSeconds().toString().padStart(2, "0");
        pushBtn.style.background = "#28a745";
        setTimeout(() => (pushBtn.style.background = "#444"), 500);
      };
      const pushHistory = () => {
        if (pushTimeout) clearTimeout(pushTimeout);
        window.history.pushState({}, "", window.location.href);
        updateHistoryIndicator();
      };
      const debouncedPush = () => {
        if (pushTimeout) clearTimeout(pushTimeout);
        pushTimeout = setTimeout(pushHistory, 3000);
      };
      pushBtn.addEventListener("click", pushHistory);

      let instanceCounter = 0;

      const init = (initialOptions = [], states = {}) => {
        instanceCounter++;
        const instanceId = instanceCounter;

        let localOptions = [...initialOptions];
        let manager = null;

        const maxHeightPresets = ["200px", "300px", "400px", "600px", ""];
        const group = document.createElement("div");
        group.className = "demo-container";

        group.innerHTML = `
                <h3>Instance #${instanceId}</h3>
                <div class="resizer-container">
                    <center-and-height-resizer 
                        id="resizer-${instanceId}" 
                        left="${states.left || "50px"}" 
                        center="${states.center || "350px"}" 
                        ${states.height ? `height="${states.height}"` : ""}
                    >
                    </center-and-height-resizer>
                </div>

                <div class="controls">
                    <strong>Search Value:</strong> 
                    <pre data-role="search-val-out" style="display: inline; padding: 2px 5px; margin: 0; background: #eee; width: auto; max-height: none;">-</pre>
                    (onChange triggers: <span data-role="onchange-count" style="font-weight: bold;">0</span>,
                    onOk triggers: <span data-role="onok-count" style="font-weight: bold;">0</span>,
                    onCancel triggers: <span data-role="oncancel-count" style="font-weight: bold;">0</span>,
                    onItemPick triggers: <span data-role="onpick-count" style="font-weight: bold;">0</span>,
                    onHighlightChange triggers: <span data-role="onhighlight-count" style="font-weight: bold;">0</span>)
                </div>

                <div class="controls">
                    <button data-role="add-btn">Add Random Option</button>
                    <div class="checkbox-wrapper" style="margin-bottom: 0;">
                        <div class="checkbox-row">
                            <input type="checkbox" data-role="loading-cb" id="loading-cb-${instanceId}">
                            <div class="content-cell">
                                <label for="loading-cb-${instanceId}">Loading Spinner</label>
                            </div>
                        </div>
                    </div>
                    <div class="checkbox-wrapper" style="margin-bottom: 0;">
                        <div class="checkbox-row">
                            <input type="checkbox" data-role="disabled-cb" id="disabled-cb-${instanceId}">
                            <div class="content-cell">
                                <label for="disabled-cb-${instanceId}">Disabled State</label>
                            </div>
                        </div>
                    </div>
                    <div class="checkbox-wrapper" style="margin-bottom: 0;">
                        <div class="checkbox-row">
                            <input type="checkbox" data-role="footer-cb" id="footer-cb-${instanceId}" checked>
                            <div class="content-cell">
                                <label for="footer-cb-${instanceId}">Show Footer</label>
                            </div>
                        </div>
                    </div>
                    <div class="checkbox-wrapper" style="margin-bottom: 0;">
                        <div class="checkbox-row">
                            <input type="checkbox" data-role="filter-cb" id="filter-cb-${instanceId}" checked>
                            <div class="content-cell">
                                <label for="filter-cb-${instanceId}">Show Filter</label>
                            </div>
                        </div>
                    </div>
                    <button class="white" data-role="focus-btn">Focus Input</button>
                    <button class="white" data-role="empty-btn">Set Custom Empty</button>
                    <button class="white" data-role="render-btn">Set Custom Render</button>
                    <button class="white" data-role="string-render-btn">Set String Render</button>
                    <button class="white" data-role="clear-btn">Clear Options</button>
                    <button class="white" data-role="attach-window-btn">Attach Arrows to Window</button>
                    <button class="white" data-role="detach-window-btn">Detach Arrows from Window</button>
                </div>

                <div class="controls">
                    <div style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">
                        <div style="display: flex; gap: 5px; align-items: center;">
                            <div class="input-wrapper" style="max-width: 300px; margin-bottom: 0;">
                                <input type="text" data-role="inject-label" id="inject-label-${instanceId}" placeholder=" ">
                                <label for="inject-label-${instanceId}">Inject label</label>
                            </div>
                            <button data-role="inject-label-btn">Set Label</button>
                        </div>
                        <div style="display: flex; gap: 5px; align-items: center;" data-role="mh-presets-container">
                            <div style="display: flex; gap: 2px;">
                                <button class="white" data-role="maxheight-down" style="padding: 0 8px; min-width: auto;">▼</button>
                                <div class="input-wrapper" style="max-width: 150px; margin-bottom: 0;">
                                    <input type="text" data-role="maxheight-input" id="maxheight-input-${instanceId}" placeholder=" ">
                                    <label for="maxheight-input-${instanceId}">Max height</label>
                                </div>
                                <button class="white" data-role="maxheight-up" style="padding: 0 8px; min-width: auto;">▲</button>
                            </div>
                            <button data-role="maxheight-btn">Set</button>
                            ${maxHeightPresets.map((val) => `<button class="white" data-role="mh-preset" data-value="${val}">${val || "Reset"}</button>`).join("")}
                        </div>
                    </div>
                </div>

                <div class="controls">
                    <strong>Options State Dump:</strong>
                    <pre data-role="options-dump"></pre>
                </div>
            `;

        document.getElementById("instances-area").appendChild(group);

        const resizer = group.querySelector("center-and-height-resizer");
        const parent = document.createElement("div");
        parent.style.height = "100%";
        resizer.appendChild(parent);
        const searchValOut = group.querySelector('[data-role="search-val-out"]');
        const onChangeCountOut = group.querySelector('[data-role="onchange-count"]');
        const onOkCountOut = group.querySelector('[data-role="onok-count"]');
        const onCancelCountOut = group.querySelector('[data-role="oncancel-count"]');
        const onPickCountOut = group.querySelector('[data-role="onpick-count"]');
        const onHighlightCountOut = group.querySelector('[data-role="onhighlight-count"]');
        const optionsDump = group.querySelector('[data-role="options-dump"]');

        const addBtn = group.querySelector('[data-role="add-btn"]');
        const loadingCb = group.querySelector('[data-role="loading-cb"]');
        const disabledCb = group.querySelector('[data-role="disabled-cb"]');
        const footerCb = group.querySelector('[data-role="footer-cb"]');
        const filterCb = group.querySelector('[data-role="filter-cb"]');
        const focusBtn = group.querySelector('[data-role="focus-btn"]');
        const emptyBtn = group.querySelector('[data-role="empty-btn"]');
        const renderBtn = group.querySelector('[data-role="render-btn"]');
        const stringRenderBtn = group.querySelector('[data-role="string-render-btn"]');
        const clearBtn = group.querySelector('[data-role="clear-btn"]');
        const attachWindowBtn = group.querySelector('[data-role="attach-window-btn"]');
        const detachWindowBtn = group.querySelector('[data-role="detach-window-btn"]');
        const injectLabelInput = group.querySelector('[data-role="inject-label"]');
        const injectLabelBtn = group.querySelector('[data-role="inject-label-btn"]');
        const maxHeightInput = group.querySelector('[data-role="maxheight-input"]');
        const maxHeightBtn = group.querySelector('[data-role="maxheight-btn"]');

        let onChangeCounter = 0;
        let onOkCounter = 0;
        let onCancelCounter = 0;
        let onPickCounter = 0;
        let onHighlightCounter = 0;

        const syncUrl = () => {
          const url = new URL(window.location);
          url.searchParams.delete(`v${instanceId}`);
          localOptions.forEach((item) => {
            const val = [item.id, item.label, item.selected ? "1" : "0"].join("|");
            url.searchParams.append(`v${instanceId}`, val);
          });

          if (resizer) {
            url.searchParams.set(`l${instanceId}`, resizer.getAttribute("left") || "50px");
            url.searchParams.set(`c${instanceId}`, resizer.getAttribute("center") || "350px");
            const h = resizer.getAttribute("height");
            if (h) {
              url.searchParams.set(`h${instanceId}`, h);
            } else {
              url.searchParams.delete(`h${instanceId}`);
            }
          }

          url.searchParams.set(`o${instanceId}`, loadingCb.checked ? "1" : "0");
          url.searchParams.set(`d${instanceId}`, disabledCb.checked ? "1" : "0");
          url.searchParams.set(`f${instanceId}`, footerCb.checked ? "1" : "0");
          url.searchParams.set(`e${instanceId}`, filterCb.checked ? "1" : "0");
          url.searchParams.set(`m${instanceId}`, states.maxHeight || "");
          url.searchParams.set(`s${instanceId}`, searchValOut.textContent === "-" ? "" : searchValOut.textContent);
          url.searchParams.set(`a${instanceId}`, injectLabelInput.value || "");
          url.searchParams.set(`y${instanceId}`, manager.propHighlightedId || "");

          window.history.replaceState({}, "", url);
          debouncedPush();
        };

        const updateDump = () => {
          optionsDump.textContent = JSON.stringify(localOptions, null, 2);
        };

        // Initialize Manager
        manager = new OptionsListManager(parent, {
          options: localOptions,
          loading: states.loading || false,
          disabled: states.disabled || false,
          showFooter: states.showFooter !== false,
          showFilter: states.showFilter !== false,
          maxHeight: states.maxHeight || "",
          value: states.value || "",
          onInputChange: (e) => {
            const val = e.target.value;
            onChangeCounter++;
            onChangeCountOut.textContent = onChangeCounter;
            searchValOut.textContent = val || "-";
            syncUrl();
          },
          onItemPick: (item) => {
            onPickCounter++;
            onPickCountOut.textContent = onPickCounter;
            console.log("Item clicked:", item);
            localOptions = localOptions.map((opt) => {
              if (opt.id === item.id) return { ...opt, selected: !opt.selected };
              return opt;
            });
            manager.setOptions(localOptions);
            updateDump();
            syncUrl();
          },
          onOk: () => {
            onOkCounter++;
            onOkCountOut.textContent = onOkCounter;
          },
          onCancel: () => {
            onCancelCounter++;
            onCancelCountOut.textContent = onCancelCounter;
          },
          onHighlightChange: (id) => {
            onHighlightCounter++;
            onHighlightCountOut.textContent = onHighlightCounter;
            syncUrl();
          },
        });

        // Handlers
        addBtn.addEventListener("click", () => {
          const id = Math.floor(Math.random() * 100000);
          localOptions.push({ id, label: "Dynamic Option " + id });
          manager.setOptions([...localOptions]);
          updateDump();
          syncUrl();
        });

        loadingCb.addEventListener("change", (e) => {
          manager.setLoading(e.target.checked);
          syncUrl();
        });

        disabledCb.addEventListener("change", (e) => {
          manager.setDisabled(e.target.checked);
          syncUrl();
        });

        footerCb.addEventListener("change", (e) => {
          manager.showFooter(e.target.checked);
          syncUrl();
        });

        filterCb.addEventListener("change", (e) => {
          manager.showFilter(e.target.checked);
          syncUrl();
        });

        focusBtn.addEventListener("click", () => manager.setFocus());
        
        emptyBtn.addEventListener("click", () => {
          manager.setRenderEmpty(() => `<div style="padding: 40px; text-align: center; color: #ff5252; font-weight: bold; border: 2px dashed #ff5252; border-radius: 8px;">⚠️ Custom Empty State!</div>`);
        });

        renderBtn.addEventListener("click", () => {
          manager.setRenderItem((item) => {
            const el = document.createElement("div");
            el.className = "element";
            el.style.padding = "12px";
            el.style.background = item.selected ? "#fff3e0" : "transparent";
            el.style.color = item.selected ? "#e65100" : "inherit";
            el.dataset.id = String(item.id);
            
            const icon = document.createElement("span");
            icon.textContent = item.selected ? "🔥 " : "❄️ ";
            icon.style.marginRight = "10px";
            
            const label = document.createElement("label");
            label.textContent = item.label;
            
            el.appendChild(icon);
            el.appendChild(label);
            return el;
          });
        });

        stringRenderBtn.addEventListener("click", () => {
          manager.setRenderItem((item) => `
            <div class="element" data-id="${item.id}" style="border: 1px solid #ccc; margin: 2px; border-radius: 20px; padding: 5px 15px; background: ${item.selected ? '#e8f5e9' : 'white'}; color: ${item.selected ? '#2e7d32' : '#333'};">
              <span style="font-size: 1.2em; vertical-align: middle;">${item.selected ? '✅' : '⬜'}</span>
              <strong style="margin-left: 10px;">${item.label}</strong>
              <small style="margin-left: auto; opacity: 0.5;">#${item.id}</small>
            </div>
          `);
        });

        clearBtn.addEventListener("click", () => {
          localOptions = [];
          manager.setOptions([]);
          updateDump();
          syncUrl();
        });

        attachWindowBtn.addEventListener("click", () => {
          manager.attachArrowsUpAndDown(window);
        });

        detachWindowBtn.addEventListener("click", () => {
          manager.detachArrowsUpAndDown(window);
        });

        injectLabelInput.addEventListener("input", () => syncUrl());

        injectLabelInput.addEventListener("input", () => syncUrl());
        injectLabelBtn.addEventListener("click", () => {
          manager.setLabel(injectLabelInput.value);
          syncUrl();
        });

        const setMH = (val) => {
          maxHeightInput.value = val || "";
          states.maxHeight = val;
          manager.setMaxHeight(val);
          syncUrl();
        };
        maxHeightBtn.addEventListener("click", () => setMH(maxHeightInput.value));
        group.querySelectorAll('[data-role="mh-preset"]').forEach((btn) => {
          btn.addEventListener("click", () => setMH(btn.dataset.value));
        });

        const stepMH = (delta) => {
          let current = parseInt(maxHeightInput.value) || 0;
          if (!maxHeightInput.value.includes("px") && maxHeightInput.value !== "") {
            // if user typed just a number, assume px
          }
          current += delta;
          if (current < 0) current = 0;
          setMH(current + "px");
        };

        group.querySelector('[data-role="maxheight-up"]').addEventListener("click", () => stepMH(10));
        group.querySelector('[data-role="maxheight-down"]').addEventListener("click", () => stepMH(-10));

        // Watch resizer changes
        resizer.addEventListener("onLeft", () => syncUrl());
        resizer.addEventListener("onCenter", () => syncUrl());
        resizer.addEventListener("onHeight", () => syncUrl());

        updateDump();
        if (states.loading) loadingCb.checked = true;
        if (states.disabled) disabledCb.checked = true;
        footerCb.checked = states.showFooter !== false;
        filterCb.checked = states.showFilter !== false;
        if (states.value) {
          searchValOut.textContent = states.value;
          injectInput.value = states.value;
        }
        if (states.label) {
          injectLabelInput.value = states.label;
        }
        if (states.maxHeight) {
          maxHeightInput.value = states.maxHeight;
        }

        if (
          (localOptions.length > 0 ||
            states.loading ||
            states.disabled ||
            states.showFooter === false ||
            states.showFilter === false ||
            states.value ||
            states.height ||
            states.left ||
            states.center) &&
          instanceId > 0
        ) {
          syncUrl();
        }

        if (states.highlight) {
          manager.itemPick(states.highlight);
        }
      };

      document.getElementById("init-btn").addEventListener("click", () => {
        init([
          { id: 101, label: "Option A" },
          { id: 102, label: "Option B", selected: true },
          { id: 103, label: "Option C", selected: true },
          { id: 104, label: "Option D" },
          { id: 105, label: "Option E" },
        ]);
      });

      const loadFromUrl = () => {
        const instancesArea = document.getElementById("instances-area");
        instancesArea.innerHTML = "";
        instanceCounter = 0;

        const urlParams = new URLSearchParams(window.location.search);
        const groups = {};
        const statesData = {};

        for (const [key, value] of urlParams.entries()) {
          const match = key.match(/^([voshlcamfed])(\d+)$/);
          if (match) {
            const [, type, id] = match;
            if (type === "v") {
              if (!groups[id]) groups[id] = [];
              groups[id].push(value);
            } else {
              if (!statesData[id]) statesData[id] = {};
              const map = {
                o: "loading",
                d: "disabled",
                m: "maxHeight",
                f: "showFooter",
                e: "showFilter",
                s: "value",
                h: "height",
                l: "left",
                c: "center",
                a: "label",
                y: "highlight",
              };
              statesData[id][map[type]] = type === "o" || type === "d" || type === "f" || type === "e" ? value === "1" : value;
            }
          }
        }

        const allIds = Array.from(new Set([...Object.keys(groups), ...Object.keys(statesData)])).sort(
          (a, b) => parseInt(a) - parseInt(b),
        );

        allIds.forEach((id) => {
          const options = (groups[id] || []).map((v) => {
            const parts = v.split("|");
            if (parts.length === 3) {
              return { id: parts[0], label: parts[1], selected: parts[2] === "1" };
            }
            return { id: Math.random().toString(36).substr(2, 9), label: v };
          });
          init(options, statesData[id] || {});
        });
      };

      window.addEventListener("popstate", loadFromUrl);
      loadFromUrl();
    </script>
    </div>
  </body>
</html>
