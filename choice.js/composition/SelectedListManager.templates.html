<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SelectedListManager Templates Demo</title>
    <link rel="stylesheet" href="SelectedListManager.css" />
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
      }
      .controls {
        margin-top: 20px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .demo-container {
        margin-top: 20px;
        padding: 20px;
        border: 1px dashed #ccc;
      }
      .demo-container label {
        display: flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
      }
      .template-btn {
        padding: 5px 10px;
        cursor: pointer;
        border: 1px solid #ccc;
        background: #fff;
        border-radius: 4px;
      }
      .template-btn:hover {
        background: #f0f0f0;
      }
    </style>
  </head>
  <body>
    <h1>SelectedListManager Templates</h1>
    <button id="init-btn">Initialize Component</button> | <a href="" id="reload-link">reload</a> | <a href=".">up ..</a>

    <div id="history-indicator" style="position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: #fff; padding: 10px; border-radius: 8px; font-size: 12px; z-index: 1000; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px);">
        <span id="history-time" style="font-family: monospace; opacity: 0.8;">No history entry</span>
        <button id="push-btn" style="cursor: pointer; background: #444; color: #fff; border: none; padding: 4px 8px; border-radius: 4px; font-weight: bold; transition: background 0.2s;">Push State</button>
    </div>

    <div id="instances-area"></div>

    <script type="module">
      import "../../js/CenterResizer.js";
      import { SelectedListManager } from "./SelectedListManager.js";

      document.getElementById("reload-link").href = window.location.pathname;

      // Global history logic
      let pushTimeout = null;
      const historyTime = document.getElementById("history-time");
      const pushBtn = document.getElementById("push-btn");
      const updateHistoryIndicator = () => {
        const now = new Date();
        historyTime.textContent =
          "Last push: " +
          now.getHours().toString().padStart(2, "0") +
          ":" +
          now.getMinutes().toString().padStart(2, "0") +
          ":" +
          now.getSeconds().toString().padStart(2, "0");
        pushBtn.style.background = "#28a745";
        setTimeout(() => (pushBtn.style.background = "#444"), 500);
      };
      const pushHistory = () => {
        if (pushTimeout) clearTimeout(pushTimeout);
        window.history.pushState({}, "", window.location.href);
        updateHistoryIndicator();
      };
      const debouncedPush = () => {
        if (pushTimeout) clearTimeout(pushTimeout);
        pushTimeout = setTimeout(pushHistory, 3000);
      };
      pushBtn.addEventListener("click", pushHistory);

      let globalIdCounter = 1;
      let instanceCounter = 0;

      const imgData = await fetch("img/img.json").then((r) => r.json());

      const init = (initialList = [], resizerLeft = "50px", resizerCenter = "350px", states = {}) => {
        instanceCounter++;
        const instanceId = instanceCounter;

        let localList = initialList;
        let manager = null;

        const syncUrl = () => {
          const url = new URL(window.location);
          url.searchParams.delete(`v${instanceId}`);
          localList.forEach((item) => {
            const val = [item.color || "", item.img || "", item.label || ""].join("|");
            url.searchParams.append(`v${instanceId}`, val);
          });

          const resizer = group.querySelector("center-resizer");
          if (resizer) {
            url.searchParams.set(`l${instanceId}`, resizer.getAttribute("left") || "50px");
            url.searchParams.set(`c${instanceId}`, resizer.getAttribute("center") || "350px");
          }

          const errorCb = group.querySelector('[data-role="error-cb"]');
          const disabledCb = group.querySelector('[data-role="disabled-cb"]');
          const inputFieldCb = group.querySelector('[data-role="input-field-cb"]');

          if (errorCb) url.searchParams.set(`e${instanceId}`, errorCb.checked ? "1" : "0");
          if (disabledCb) url.searchParams.set(`d${instanceId}`, disabledCb.checked ? "1" : "0");
          if (inputFieldCb) url.searchParams.set(`i${instanceId}`, inputFieldCb.checked ? "1" : "0");

          window.history.replaceState({}, "", url);
          debouncedPush();
        };

        // Update globalIdCounter based on loaded list
        localList.forEach((item) => {
          if (item.id >= globalIdCounter) {
            globalIdCounter = item.id + 1;
          }
        });

        // Build the DOM group
        const group = document.createElement("div");
        group.className = "demo-container";

        let templateButtonsHtml = "";
        for (const [color, images] of Object.entries(imgData)) {
          images.forEach((img) => {
            templateButtonsHtml += `<button class="template-btn" data-role="template-btn" data-color="${color}" data-img="${img}" style="color: ${color}">${img}</button>`;
          });
        }

        group.innerHTML = `
                <center-resizer id="resizer-${instanceId}" left="${resizerLeft}" center="${resizerCenter}">
                    <div data-role="list-parent" id="list-parent-${instanceId}"></div>
                </center-resizer>

                <div style="margin-top: 10px;">
                    Input Value: <pre data-role="input-value-out" id="input-value-out-${instanceId}" style="display: inline; background: #eee; padding: 2px 5px;"></pre>
                    (onChange triggers: <span data-role="onchange-counter" id="onchange-counter-${instanceId}" style="font-weight: bold;">0</span>,
                    onFocus triggers: <span data-role="onfocus-counter" id="onfocus-counter-${instanceId}" style="font-weight: bold;">0</span>,
                    last key: <span data-role="last-key" id="last-key-${instanceId}" style="font-weight: bold; color: #d11;">-</span>)
                </div>

                <div class="controls">
                    <strong>Templates:</strong>
                    ${templateButtonsHtml}
                </div>

                <div class="controls">
                    <input type="text" data-role="new-item-input" id="new-item-input-${instanceId}" placeholder="New item label">
                    <button data-role="add-btn" id="add-btn-${instanceId}">Add Item</button>
                </div>

                <div class="controls">
                    <label><input type="checkbox" data-role="error-cb" id="error-cb-${instanceId}"> Error State</label>
                    <label><input type="checkbox" data-role="disabled-cb" id="disabled-cb-${instanceId}"> Disabled State</label>
                    <label><input type="checkbox" data-role="input-field-cb" id="input-field-cb-${instanceId}" checked> Show Input Field</label>
                </div>

                <div class="controls">
                    <input type="text" data-role="inject-input-value" id="inject-input-value-${instanceId}" placeholder="Inject input value">
                    <button data-role="inject-btn" id="inject-btn-${instanceId}">Set Input Value</button>
                </div>

                <div class="controls">
                    <input type="text" data-role="inject-label-value" id="inject-label-value-${instanceId}" placeholder="Inject label value">
                    <button data-role="inject-label-btn" id="inject-label-btn-${instanceId}">Set Label Value</button>
                </div>

                <div class="controls">
                    <pre data-role="list-dump" style="background: #f9f9f9; border: 1px solid #ddd; padding: 10px; width: 100%; box-sizing: border-box; overflow: auto;"></pre>
                </div>
            `;

        document.getElementById("instances-area").appendChild(group);

        const parentElement = group.querySelector('[data-role="list-parent"]');
        const inputValueOut = group.querySelector('[data-role="input-value-out"]');
        const newItemInput = group.querySelector('[data-role="new-item-input"]');
        const addBtn = group.querySelector('[data-role="add-btn"]');
        const errorCb = group.querySelector('[data-role="error-cb"]');
        const disabledCb = group.querySelector('[data-role="disabled-cb"]');
        const inputFieldCb = group.querySelector('[data-role="input-field-cb"]');
        const injectInput = group.querySelector('[data-role="inject-input-value"]');
        const injectBtn = group.querySelector('[data-role="inject-btn"]');
        const injectLabelInput = group.querySelector('[data-role="inject-label-value"]');
        const injectLabelBtn = group.querySelector('[data-role="inject-label-btn"]');
        const onChangeCounter = group.querySelector('[data-role="onchange-counter"]');
        const onFocusCounter = group.querySelector('[data-role="onfocus-counter"]');
        const lastKeyOut = group.querySelector('[data-role="last-key"]');
        const listDump = group.querySelector('[data-role="list-dump"]');
        let counter = 0;
        let focusCounter = 0;

        const updateDump = () => {
          if (localList.length === 0) {
            listDump.textContent = "[]";
            return;
          }
          listDump.textContent = "[\n" + localList.map((item) => "  " + JSON.stringify(item)).join(",\n") + "\n]";
        };

        manager = new SelectedListManager(parentElement, {
          list: localList,
          label: "Select options",
          onDelete: function (id) {
            localList = localList.filter((item) => String(item.id) !== String(id));
            this.updateList(localList);
            syncUrl();
            updateDump();
          },
          onClear: function () {
            localList = [];
            this.updateList(localList);
            syncUrl();
            updateDump();
          },
          onChange: function (e) {
            inputValueOut.textContent = e.target.value;
            onChangeCounter.textContent = ++counter;
            // lastKeyOut.textContent = e.key || e.data || e.type;
            lastKeyOut.textContent = e.key || typeof e.key;

            if (e.type === "keydown") {
              if (e.key === "Enter" && e.target.value.trim() !== "") {
                localList.push({ id: globalIdCounter++, label: e.target.value.trim() });
                e.target.value = "";
                this.updateList(localList);
                syncUrl();
                updateDump();
                return;
              }

              if (e.key === "Backspace" && e.target.value === "" && localList.length > 0) {
                localList.pop();
                this.updateList(localList);
                syncUrl();
                updateDump();
                return;
              }
            }
          },
          onFocus: function (e) {
            onFocusCounter.textContent = ++focusCounter;
          },
          renderItem: function (item) {
            const el = document.createElement("div");
            el.className = "element";
            el.dataset.id = String(item.id);
            el.style.border = `2px solid ${item.color || "black"}`;
            el.style.display = "flex";
            el.style.alignItems = "center";
            el.style.gap = "5px";
            el.style.padding = "5px";
            el.style.background = "#fff";

            if (item.img) {
              const img = document.createElement("img");
              img.src = `img/${item.img}`;
              img.style.width = "20px";
              img.style.height = "20px";
              img.style.objectFit = "contain";
              el.appendChild(img);
            }

            const label = document.createElement("label");
            label.textContent = item.label;

            const del = document.createElement("div");
            del.dataset.remove = String(item.id);

            el.appendChild(label);
            el.appendChild(del);

            return el;
          },
          renderList: function (list) {
            const elements = list.map((item) => this.propOptions.renderItem.call(this, item));
            const groups = [];
            for (let i = 0; i < elements.length; i += 3) {
              const groupDiv = document.createElement("div");
              groupDiv.style.border = "2px solid gray";
              groupDiv.style.padding = "3px";
              groupDiv.style.margin = "2px";
              groupDiv.style.display = "flex";
              groupDiv.style.gap = "5px";
              groupDiv.style.flexWrap = "wrap";
              const chunk = elements.slice(i, i + 3);
              chunk.forEach((el) => groupDiv.appendChild(el));
              groups.push(groupDiv);
            }
            return groups;
          },
        });

        updateDump();

        // Apply states
        if (states.error) {
          errorCb.checked = true;
          manager.setErrorState(true);
        }
        if (states.disabled) {
          disabledCb.checked = true;
          manager.setDisabled(true);
        }
        if (states.showInput === false) {
          inputFieldCb.checked = false;
          manager.setShowInput(false);
        }

        if (
          (localList.length > 0 ||
            resizerLeft !== "50px" ||
            resizerCenter !== "350px" ||
            states.error ||
            states.disabled ||
            states.showInput === false) &&
          instanceId > 0
        ) {
          syncUrl();
        }

        // Template button handlers
        group.querySelectorAll('[data-role="template-btn"]').forEach((btn) => {
          btn.addEventListener("click", () => {
            const color = btn.dataset.color;
            const img = btn.dataset.img;
            localList.push({
              id: globalIdCounter++,
              label: img.split(".")[0],
              color: color,
              img: img,
            });
            manager.updateList(localList);
            syncUrl();
            updateDump();
          });
        });

        addBtn.addEventListener("click", () => {
          let val = newItemInput.value.trim();
          let usedInternal = false;

          if (!val && manager.propInputElement) {
            val = manager.propInputElement.value.trim();
            usedInternal = true;
          }

          newItemInput.value = "";

          if (val) {
            localList.push({ id: globalIdCounter++, label: val });
            manager.updateList(localList);
            syncUrl();
            updateDump();

            if (usedInternal) {
              manager.setValue("");
              inputValueOut.textContent = "";
            }
          }
        });

        errorCb.addEventListener("change", (e) => {
          manager.setErrorState(e.target.checked);
          syncUrl();
        });

        disabledCb.addEventListener("change", (e) => {
          manager.setDisabled(e.target.checked);
          syncUrl();
        });

        inputFieldCb.addEventListener("change", (e) => {
          manager.setShowInput(e.target.checked);
          syncUrl();
        });

        injectBtn.addEventListener("click", () => {
          manager.setValue(injectInput.value);
          injectInput.value = "";
        });

        injectLabelBtn.addEventListener("click", () => {
          manager.setLabel(injectLabelInput.value);
          injectLabelInput.value = "";
        });

        // Watch resizer changes
        const resizer = group.querySelector("center-resizer");
        resizer.addEventListener("onLeft", () => syncUrl());
        resizer.addEventListener("onCenter", () => syncUrl());
      };

      document.getElementById("init-btn").addEventListener("click", () => init());

      const loadFromUrl = () => {
        const instancesArea = document.getElementById("instances-area");
        instancesArea.innerHTML = "";
        instanceCounter = 0;
        globalIdCounter = 1;

        const urlParams = new URLSearchParams(window.location.search);
        const groups = {};
        const resizerData = {};
        const statesData = {};

        for (const [key, value] of urlParams.entries()) {
          const match = key.match(/^([vlcdeoi])(\d+)$/);
          if (match) {
            const [, type, id] = match;
            if (type === "v") {
              if (!groups[id]) groups[id] = [];
              groups[id].push(value);
            } else if (type === "l" || type === "c") {
              if (!resizerData[id]) resizerData[id] = {};
              resizerData[id][type === "l" ? "left" : "center"] = value;
            } else {
              if (!statesData[id]) statesData[id] = {};
              const map = { e: "error", d: "disabled", o: "loading", i: "showInput" };
              statesData[id][map[type]] = value === "1";
            }
          }
        }

        const allIds = Array.from(
          new Set([...Object.keys(groups), ...Object.keys(resizerData), ...Object.keys(statesData)]),
        ).sort((a, b) => parseInt(a) - parseInt(b));

        allIds.forEach((id) => {
          const list = (groups[id] || []).map((v) => {
            const parts = v.split("|");
            if (parts.length === 3) {
              return {
                id: globalIdCounter++,
                color: parts[0] || undefined,
                img: parts[1] || undefined,
                label: parts[2],
              };
            }
            return { id: globalIdCounter++, label: v };
          });
          const left = resizerData[id]?.left || "50px";
          const center = resizerData[id]?.center || "350px";
          init(list, left, center, statesData[id] || {});
        });
      };

      window.addEventListener("popstate", loadFromUrl);
      loadFromUrl();
    </script>
  </body>
</html>
