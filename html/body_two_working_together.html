<form autocomplete="on" class="gcp-css">
  <!-- Field 1 -->
  <div class="input-wrapper" id="name-wrapper">
    <input type="text" id="name" name="name" placeholder="&nbsp;" autocomplete="name" />
    <label for="name">Project Name *</label>
    <div class="error">This field is required</div>
    <div class="helper-text">Enter a valid GCP admin email</div>
  </div>

  <!-- Field 2 -->
  <div class="gcp-css input-wrapper" id="email-wrapper">
    <input type="email" id="email" placeholder="&nbsp;" autocomplete="email" />
    <label for="email">User Email</label>
    <div class="error">Enter a valid user email</div>
    <div class="helper-text">Enter a valid GCP admin email</div>
  </div>
</form>

<label for="cities">Cities</label>
<select class="form-control" name="cities" id="cities">
  <option value="">Choose a city</option>
  <option value="Leeds">Leeds</option>
  <option value="Manchester">Manchester</option>
  <option value="London">London</option>
  <option value="Sheffield">Sheffield</option>
  <option value="Newcastle">Newcastle</option>
</select>

<label for="tube-stations">Tube stations</label>
<select class="form-control" name="tube-stations" id="tube-stations">
  <option value="">Choose a tube station</option>
  <option value="Moorgate">Moorgate</option>
  <option value="St Pauls">St Pauls</option>
  <option value="Old Street">Old Street</option>
  <option value="Liverpool Street">Liverpool Street</option>
  <option value="Kings Cross St. Pancras">Kings Cross St. Pancras</option>
</select>

<div style="margin: 20px 0">
  <strong>Collected Values (JSON):</strong>
  <pre
    id="values-display"
    style="background: #eee; padding: 12px; border-radius: 4px; font-size: 13px; margin-top: 8px"
  ></pre>
</div>

<hr />
<alert-box>
  Two dropdowns working together
  <br />
  'Tube stations' will only be enabled if the value of 'Cities' is 'London'
</alert-box>

<script type="module">
  import Choices from "choices.js";

  const display = document.getElementById("values-display");

  var cities = new Choices(document.getElementById("cities"), { allowHTML: true });
  var tubeStations = new Choices(document.getElementById("tube-stations"), { allowHTML: true }).disable();

  cities.passedElement.element.addEventListener("change", function (e) {
    if (e.detail.value === "London") {
      tubeStations.enable();
    } else {
      tubeStations.setChoiceByValue("");
      tubeStations.disable();
    }
  });

  const updateDisplay = () => {
    // Collect all values
    const city = cities.getValue(true);
    const tubeStation = tubeStations.getValue(true);

    const values = {
      city,
      tubeStation,
    };

    display.textContent = JSON.stringify(values, null, 2);
  };

  // Listen for changes
  cities.passedElement.element.addEventListener("change", updateDisplay);
  tubeStations.passedElement.element.addEventListener("change", updateDisplay);

  // Trigger on start
  updateDisplay();
</script>
