<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CompositeSelect Web Component Demo</title>

    <!-- CSS loaded globally — composite-select uses light DOM, same as demo.html -->
    <link rel="stylesheet" href="../../floating-label-pattern.css" />
    <link rel="stylesheet" href="https://stopsopa.github.io/pages/js/popper/html-vanilla/popover.css" />
    <link rel="stylesheet" href="../selected-section/SelectedSectionManager.css" />
    <link rel="stylesheet" href="../options-section/OptionsSectionManager.css" />

    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        padding: 2rem;
        background-color: #f0f2f5;
        color: #333;
      }
      h1 {
        margin-bottom: 20px;
        font-weight: 300;
      }
      #instances-area {
        display: flex;
        flex-direction: column;
        gap: 30px;
      }
      .demo-section {
        background: white;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        border: 1px solid #ddd;
        position: relative;
      }
      .demo-section h2 {
        margin-top: 0;
        margin-bottom: 1.5rem;
        font-size: 1.1rem;
        color: #666;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .resizer-container {
        padding-top: 20px;
        border: 1px dashed #ccc;
        margin-bottom: 15px;
        position: relative;
        background: #fafafa;
        min-height: 50px;
        padding-bottom: 16px;
      }
      .controls {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        align-items: center;
        padding-top: 1rem;
        border-top: 1px solid #eee;
        & > * {
          margin-bottom: 0 !important;
        }
      }
      .controls-label {
        flex: 1 1 100%;
        font-weight: bold;
        font-size: 11px;
        margin-bottom: 4px;
        text-transform: uppercase;
        color: #666;
      }
      #init-btn {
        margin-bottom: 20px;
      }
      .destroy-btn {
        position: absolute;
        top: 1rem;
        right: 1rem;
      }
      pre#url-display {
        background: #eee;
        padding: 10px;
        margin-bottom: 10px;
        white-space: pre-wrap;
        word-break: break-all;
        border: 1px solid #ccc;
        font-size: 12px;
      }
      .template-btn {
        padding: 5px 10px;
        cursor: pointer;
        border: 1px solid #ccc;
        background: #fff;
        border-radius: 4px;
        font-size: 13px;
      }
      .template-btn:hover {
        background: #f0f0f0;
      }
    </style>
  </head>
  <body>
    <div
      id="page-description"
      style="
        position: fixed;
        top: 10px;
        right: 10px;
        background: rgba(0, 0, 0, 0.8);
        color: #fff;
        padding: 10px;
        border-radius: 8px;
        font-size: 14px;
        z-index: 1000;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        max-width: 280px;
        backdrop-filter: blur(5px);
      "
    >
      <strong>composite-select</strong> web component wrapping CompositeManager.<br />
      Attributes: <code>selected-*</code>, <code>options-*</code>, <code>container-*</code>
    </div>

    <pre id="url-display"></pre>

    <button id="init-btn" class="gcp-css">Initialize New Instance</button> |
    <a href="" id="reload-link" class="gcp-css">reload</a> | <a href="./" class="gcp-css">up ..</a> |
    <a href="demo.html.html" class="gcp-css">demo.html.html (class)</a>

    <div id="instances-area"></div>

    <script type="module" src="./composite-select.html.js"></script>
  </body>
</html>
