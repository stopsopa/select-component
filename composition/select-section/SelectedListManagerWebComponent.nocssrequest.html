<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SelectedListManager WebComponent Templates Demo</title>
    <!-- Global CSS configuration for the SelectedList component -->
    <link rel="stylesheet" href="../../floating-label-pattern.css" />
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        padding: 20px;
        background: #f0f2f5;
        color: #333;
      }
      h1 {
        margin-bottom: 20px;
        font-weight: 300;
      }
      .controls {
        margin-top: 15px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        padding-top: 15px;
        border-top: 1px solid #eee;
      }
      .demo-container {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        border: 1px solid #ddd;
        margin-top: 20px;
      }
      .demo-container label {
        display: flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
        font-size: 14px;
      }
      .template-btn {
        padding: 5px 10px;
        cursor: pointer;
        border: 1px solid #ccc;
        background: #fff;
        border-radius: 4px;
        font-size: 13px;
      }
      .template-btn:hover {
        background: #f0f0f0;
      }
      pre {
        background: #f8f8f8;
        padding: 12px;
        border: 1px solid #eee;
        border-radius: 4px;
        font-size: 12px;
        max-height: 150px;
        overflow: auto;
        width: 100%;
        box-sizing: border-box;
        margin-top: 10px;
      }
      h3 {
        margin-top: 0;
        font-weight: 400;
        color: #555;
      }
    </style>
  </head>
  <body class="gcp-css">
    <div style="padding: 20px">
      <h1>SelectedListManager WebComponent Templates</h1>
      <ace-editor lang="javascript">
        <script type="ace">

          import { SelectedList } from "./selected-list.js";

          // 1. If using a bundler like Vite/Webpack:
          // SelectedList.cssText = (await import("./SelectedListManager.css?raw")).default;

          const css1 = await fetch("../../floating-label-pattern.css").then(r => r.text());
          // where floating-label-pattern.css is not needed really, but is here to show how to load multiple css files

          const css2 = await fetch("./SelectedListManager.css").then(r => r.text());
          SelectedList.cssText = css1 + "\n" + css2;
        </script>
      </ace-editor>
      <hr />
      <p>
        This demo uses <code>&lt;selected-list&gt;</code> web component. Use buttons below to set custom templates via
        JavaScript API.
      </p>
      <button id="init-btn">Initialize New Instance</button> | <a href="" id="reload-link">reload</a> |
      <a href=".">up ..</a>

      <div
        id="history-indicator"
        style="
          position: fixed;
          top: 10px;
          right: 10px;
          background: rgba(0, 0, 0, 0.8);
          color: #fff;
          padding: 10px;
          border-radius: 8px;
          font-size: 12px;
          z-index: 1000;
          display: flex;
          align-items: center;
          gap: 10px;
          box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
          border: 1px solid rgba(255, 255, 255, 0.1);
          backdrop-filter: blur(5px);
        "
      >
        <span id="history-time" style="font-family: monospace; opacity: 0.8">No history entry</span>
        <button
          id="push-btn"
          style="
            cursor: pointer;
            background: #444;
            color: #fff;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            transition: background 0.2s;
          "
        >
          Push State
        </button>
      </div>

      <div id="instances-area"></div>

      <script type="module">
        import "../../../js/CenterResizer.js";
        import { SelectedList } from "./selected-list.js";

        // 1. If using a bundler like Vite/Webpack:
        // OptionsList.cssText = (await import("./OptionsListManager.css?raw")).default;
        // const css1 = await fetch("../../floating-label-pattern.css").then((r) => r.text());
        const css2 = await fetch("./SelectedListManager.css").then((r) => r.text());
        // OptionsList.cssText = css1 + "\n" + css2;
        SelectedList.cssText = css2;

        document.getElementById("reload-link").href = window.location.pathname;

        // Global history logic
        let pushTimeout = null;
        const historyTime = document.getElementById("history-time");
        const pushBtn = document.getElementById("push-btn");
        const updateHistoryIndicator = () => {
          const now = new Date();
          historyTime.textContent =
            "Last push: " +
            now.getHours().toString().padStart(2, "0") +
            ":" +
            now.getMinutes().toString().padStart(2, "0") +
            ":" +
            now.getSeconds().toString().padStart(2, "0");
          pushBtn.style.background = "#28a745";
          setTimeout(() => (pushBtn.style.background = "#444"), 500);
        };
        const pushHistory = () => {
          if (pushTimeout) clearTimeout(pushTimeout);
          window.history.pushState({}, "", window.location.href);
          updateHistoryIndicator();
        };
        const debouncedPush = () => {
          if (pushTimeout) clearTimeout(pushTimeout);
          pushTimeout = setTimeout(pushHistory, 3000);
        };
        pushBtn.addEventListener("click", pushHistory);

        let globalIdCounter = 1;
        let instanceCounter = 0;

        const imgData = await fetch("../img/img.json").then((r) => r.json());

        const init = (initialList = [], resizerLeft = "50px", resizerCenter = "450px", states = {}) => {
          instanceCounter++;
          const instanceId = instanceCounter;

          let localList = initialList;

          const syncUrl = () => {
            const url = new URL(window.location);
            url.searchParams.delete(`v${instanceId}`);
            localList.forEach((item) => {
              const val = [item.color || "", item.img || "", item.label || ""].join("|");
              url.searchParams.append(`v${instanceId}`, val);
            });

            const resizer = group.querySelector("center-resizer");
            if (resizer) {
              url.searchParams.set(`l${instanceId}`, resizer.getAttribute("left") || "50px");
              url.searchParams.set(`c${instanceId}`, resizer.getAttribute("center") || "350px");
            }

            const errorCb = group.querySelector('[data-role="error-cb"]');
            const disabledCb = group.querySelector('[data-role="disabled-cb"]');
            const inputFieldCb = group.querySelector('[data-role="input-field-cb"]');

            if (errorCb) url.searchParams.set(`e${instanceId}`, errorCb.checked ? "1" : "0");
            if (disabledCb) url.searchParams.set(`d${instanceId}`, disabledCb.checked ? "1" : "0");
            if (inputFieldCb) url.searchParams.set(`i${instanceId}`, inputFieldCb.checked ? "1" : "0");

            window.history.replaceState({}, "", url);
            debouncedPush();
          };

          // Update globalIdCounter based on loaded list
          localList.forEach((item) => {
            if (item.id >= globalIdCounter) {
              globalIdCounter = item.id + 1;
            }
          });

          // Build the DOM group
          const group = document.createElement("div");
          group.className = "demo-container";

          let templateButtonsHtml = "";
          for (const [color, images] of Object.entries(imgData)) {
            images.forEach((img) => {
              templateButtonsHtml += `<button class="template-btn white" data-role="template-btn" data-color="${color}" data-img="${img}" style="color: ${color}">${img}</button>`;
            });
          }

          group.innerHTML = `
                <h3>Instance #${instanceId}</h3>
                <center-resizer id="resizer-${instanceId}" left="${resizerLeft}" center="${resizerCenter}">
                    <selected-list 
                        id="sl-${instanceId}" 
                        label="Select options"
                        ${states.error ? "error" : ""}
                        ${states.disabled ? "disabled" : ""}
                        show-input="${states.showInput !== false}"
                        onFocus="this.handleDemoFocus(event)"
                        onClear="this.handleDemoClear(event)"
                    ></selected-list>
                </center-resizer>

                <div class="controls" style="margin-top: 15px; border-top: none;">
                    <strong>Input Value:</strong> <pre data-role="input-value-out" id="input-value-out-${instanceId}" style="display: inline; background: #eee; padding: 2px 5px; margin: 0; width: auto; max-height: none;">-</pre>
                    (onChange: <span data-role="onchange-counter" id="onchange-counter-${instanceId}" style="font-weight: bold;">0</span>,
                    onFocus: <span data-role="onfocus-counter" id="onfocus-counter-${instanceId}" style="font-weight: bold;">0</span>,
                    last key: <span data-role="last-key" id="last-key-${instanceId}" style="font-weight: bold; color: #d11;">-</span>)
                </div>

                <div class="controls">
                    <strong>Templates:</strong>
                    ${templateButtonsHtml}
                </div>

                <div class="controls">
                    <button class="white" data-role="custom-render-btn">Set Custom Render Item</button>
                    <button class="white" data-role="custom-list-render-btn">Set Custom Render List</button>
                    <button class="white" data-role="reset-templates-btn">Reset Templates</button>
                </div>

                <div class="controls">
                    <div class="input-wrapper" style="max-width: 300px; margin-bottom: 0;">
                        <input type="text" data-role="new-item-input" id="new-item-input-${instanceId}" placeholder=" ">
                        <label for="new-item-input-${instanceId}">New item label</label>
                    </div>
                    <button data-role="add-btn" id="add-btn-${instanceId}">Add Item</button>
                </div>

                <div class="controls" style="margin-top: 20px;">
                    <div class="checkbox-wrapper" style="margin-bottom: 0;">
                        <div class="checkbox-row">
                            <input type="checkbox" data-role="error-cb" id="error-cb-${instanceId}" ${states.error ? "checked" : ""}>
                            <div class="content-cell">
                                <label for="error-cb-${instanceId}">Error State</label>
                            </div>
                        </div>
                    </div>
                    <div class="checkbox-wrapper" style="margin-bottom: 0;">
                        <div class="checkbox-row">
                            <input type="checkbox" data-role="disabled-cb" id="disabled-cb-${instanceId}" ${states.disabled ? "checked" : ""}>
                            <div class="content-cell">
                                <label for="disabled-cb-${instanceId}">Disabled State</label>
                            </div>
                        </div>
                    </div>
                    <div class="checkbox-wrapper" style="margin-bottom: 0;">
                        <div class="checkbox-row">
                            <input type="checkbox" data-role="input-field-cb" id="input-field-cb-${instanceId}" ${states.showInput !== false ? "checked" : ""}>
                            <div class="content-cell">
                                <label for="input-field-cb-${instanceId}">Show Input Field</label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="controls" style="margin-top: 20px;">
                    <div class="input-wrapper" style="max-width: 300px; margin-bottom: 0;">
                        <input type="text" data-role="inject-label-value" id="inject-label-value-${instanceId}" placeholder=" ">
                        <label for="inject-label-value-${instanceId}">Inject label value</label>
                    </div>
                    <button data-role="inject-label-btn" id="inject-label-btn-${instanceId}">Set Label Value</button>
                </div>

                <div class="controls" style="margin-top: 20px;">
                    <strong>List Data Dump:</strong>
                    <pre data-role="list-dump"></pre>
                </div>
            `;

          document.getElementById("instances-area").appendChild(group);

          const sl = group.querySelector("selected-list");
          const inputValueOut = group.querySelector('[data-role="input-value-out"]');
          const newItemInput = group.querySelector('[data-role="new-item-input"]');
          const addBtn = group.querySelector('[data-role="add-btn"]');
          const errorCb = group.querySelector('[data-role="error-cb"]');
          const disabledCb = group.querySelector('[data-role="disabled-cb"]');
          const inputFieldCb = group.querySelector('[data-role="input-field-cb"]');
          const injectLabelInput = group.querySelector('[data-role="inject-label-value"]');
          const injectLabelBtn = group.querySelector('[data-role="inject-label-btn"]');
          const onChangeCounter = group.querySelector('[data-role="onchange-counter"]');
          const onFocusCounter = group.querySelector('[data-role="onfocus-counter"]');
          const lastKeyOut = group.querySelector('[data-role="last-key"]');
          const listDump = group.querySelector('[data-role="list-dump"]');
          const customRenderBtn = group.querySelector('[data-role="custom-render-btn"]');
          const customListRenderBtn = group.querySelector('[data-role="custom-list-render-btn"]');
          const resetTemplatesBtn = group.querySelector('[data-role="reset-templates-btn"]');

          let counter = 0;
          let focusCounter = 0;

          const updateDump = () => {
            const list = sl.selected;
            if (list.length === 0) {
              listDump.textContent = "[]";
              return;
            }
            listDump.textContent = "[\n" + list.map((item) => "  " + JSON.stringify(item)).join(",\n") + "\n]";
          };

          // Initialize list via property
          sl.selected = localList;

          // Register events
          sl.addEventListener("onDelete", (e) => {
            localList = localList.filter((item) => String(item.id) !== String(e.detail.id));
            sl.selected = localList;
            syncUrl();
            updateDump();
          });

          sl.handleDemoClear = () => {
            localList = [];
            sl.selected = localList;
            syncUrl();
            updateDump();
          };

          sl.addEventListener("onChange", (e) => {
            inputValueOut.textContent = e.detail.value || "-";
            onChangeCounter.textContent = ++counter;
            lastKeyOut.textContent = e.detail.key || typeof e.detail.key;

            const originalEvent = e.detail.originalEvent;
            if (originalEvent.type === "keydown") {
              if (originalEvent.key === "Enter" && e.detail.value.trim() !== "") {
                localList.push({ id: globalIdCounter++, label: e.detail.value.trim() });
                sl.value = ""; // Clear internal input
                sl.selected = localList;
                syncUrl();
                updateDump();
                return;
              }

              if (originalEvent.key === "Backspace" && e.detail.value === "" && localList.length > 0) {
                localList.pop();
                sl.selected = localList;
                syncUrl();
                updateDump();
                return;
              }
            }
          });

          sl.handleDemoFocus = (e) => {
            onFocusCounter.textContent = ++focusCounter;
          };

          updateDump();

          // Template button handlers
          group.querySelectorAll('[data-role="template-btn"]').forEach((btn) => {
            btn.addEventListener("click", () => {
              const color = btn.dataset.color;
              const img = btn.dataset.img;
              localList.push({
                id: globalIdCounter++,
                label: img.split(".")[0],
                color: color,
                img: img,
              });
              sl.selected = localList;
              syncUrl();
              updateDump();
            });
          });

          customRenderBtn.addEventListener("click", () => {
            sl.setRenderItem(function (item, defaultRender) {
              const el = document.createElement("div");
              el.className = "element";
              el.dataset.id = String(item.id);
              el.style.border = `2px solid ${item.color || "black"}`;
              el.style.display = "flex";
              el.style.alignItems = "center";
              el.style.gap = "5px";
              el.style.padding = "5px";
              el.style.background = "#fff";

              if (item.img) {
                const img = document.createElement("img");
                img.src = `../img/${item.img}`;
                img.style.width = "20px";
                img.style.height = "20px";
                img.style.objectFit = "contain";
                el.appendChild(img);
              }

              const label = document.createElement("label");
              label.textContent = item.label;

              const del = document.createElement("div");
              del.dataset.remove = String(item.id);

              el.appendChild(label);
              el.appendChild(del);

              return el;
            });
          });

          customListRenderBtn.addEventListener("click", () => {
            sl.setRenderList(function (selected, defaultRenderList) {
              // Use the provided defaultRenderList(selected) to get the list of elements.
              // This automatically handles the context and uses the current renderItem.
              const elements = defaultRenderList(selected);

              const groups = [];
              for (let i = 0; i < elements.length; i += 3) {
                const groupDiv = document.createElement("div");
                groupDiv.style.border = "1px solid #1a73e8";
                groupDiv.style.borderRadius = "8px";
                groupDiv.style.padding = "8px";
                groupDiv.style.margin = "4px";
                groupDiv.style.display = "flex";
                groupDiv.style.gap = "8px";
                groupDiv.style.flexWrap = "wrap";
                groupDiv.style.background = "#e8f0fe";
                groupDiv.style.boxShadow = "0 2px 5px rgba(0,0,0,0.05)";
                const chunk = elements.slice(i, i + 3);
                chunk.forEach((el) => groupDiv.appendChild(el));
                groups.push(groupDiv);
              }
              return groups;
            });
          });

          resetTemplatesBtn.addEventListener("click", () => {
            sl.setRenderItem();
            sl.setRenderList();
          });

          addBtn.addEventListener("click", () => {
            let val = newItemInput.value.trim();
            let usedInternal = false;

            if (!val) {
              val = sl.value.trim();
              usedInternal = true;
            }

            newItemInput.value = "";

            if (val) {
              localList.push({ id: globalIdCounter++, label: val });
              sl.selected = localList;
              syncUrl();
              updateDump();

              if (usedInternal) {
                sl.value = "";
                inputValueOut.textContent = "-";
              }
            }
          });

          errorCb.addEventListener("change", (e) => {
            sl.error = e.target.checked;
            syncUrl();
          });

          disabledCb.addEventListener("change", (e) => {
            sl.disabled = e.target.checked;
            syncUrl();
          });

          inputFieldCb.addEventListener("change", (e) => {
            sl.setShowInput(e.target.checked);
            syncUrl();
          });

          injectLabelBtn.addEventListener("click", () => {
            sl.label = injectLabelInput.value;
            injectLabelInput.value = "";
          });

          // Watch resizer changes
          const resizer = group.querySelector("center-resizer");
          resizer.addEventListener("onLeft", () => syncUrl());
          resizer.addEventListener("onCenter", () => syncUrl());
        };

        document.getElementById("init-btn").addEventListener("click", () => init());

        const loadFromUrl = () => {
          const instancesArea = document.getElementById("instances-area");
          instancesArea.innerHTML = "";
          instanceCounter = 0;
          globalIdCounter = 1;

          const urlParams = new URLSearchParams(window.location.search);
          const groups = {};
          const resizerData = {};
          const statesData = {};

          for (const [key, value] of urlParams.entries()) {
            const match = key.match(/^([vlcdeoi])(\d+)$/);
            if (match) {
              const [, type, id] = match;
              if (type === "v") {
                if (!groups[id]) groups[id] = [];
                groups[id].push(value);
              } else if (type === "l" || type === "c") {
                if (!resizerData[id]) resizerData[id] = {};
                resizerData[id][type === "l" ? "left" : "center"] = value;
              } else {
                if (!statesData[id]) statesData[id] = {};
                const map = { e: "error", d: "disabled", o: "loading", i: "showInput" };
                statesData[id][map[type]] = value === "1";
              }
            }
          }

          const allIds = Array.from(
            new Set([...Object.keys(groups), ...Object.keys(resizerData), ...Object.keys(statesData)]),
          ).sort((a, b) => parseInt(a) - parseInt(b));

          allIds.forEach((id) => {
            const list = (groups[id] || []).map((v) => {
              const parts = v.split("|");
              if (parts.length === 3) {
                return {
                  id: globalIdCounter++,
                  color: parts[0] || undefined,
                  img: parts[1] || undefined,
                  label: parts[2],
                };
              }
              return { id: globalIdCounter++, label: v };
            });
            const left = resizerData[id]?.left || "50px";
            const center = resizerData[id]?.center || "350px";
            init(list, left, center, statesData[id] || {});
          });
        };

        window.addEventListener("popstate", loadFromUrl);
        loadFromUrl();
      </script>
      <script
        type="module"
        src="https://stopsopa.github.io/ace-editor-webcomponent/ace-web-component.js"
        data-main-ace="https://stopsopa.github.io/ace-editor-webcomponent/noprettier/ace/ace-builds-1.43.4/src-min-noconflict/ace.js"
      ></script>
    </div>
  </body>
</html>
