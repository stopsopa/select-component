<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OptionsSection WebComponent Attributes Demo</title>
    <link rel="stylesheet" href="../../floating-label-pattern.css" />
    <!-- No meta tag or link tag here because we are injecting CSS via JS to avoid extra requests -->
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        padding: 20px;
        background: #f0f2f5;
        color: #333;
      }
      h1 {
        margin-bottom: 20px;
        font-weight: 300;
      }
      #instances-area {
        display: flex;
        flex-direction: column;
        gap: 30px;
      }
      .demo-container {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        border: 1px solid #ddd;
        position: relative;
      }
      .destroy-btn {
        position: absolute;
        top: 1rem;
        right: 1rem;
      }
      .resizer-container {
        border: 1px dashed #ccc;
        margin-bottom: 15px;
        position: relative;
        background: #fafafa;
      }
      .controls {
        margin-top: 15px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        padding-top: 15px;
        border-top: 1px solid #eee;
      }
      .controls strong {
        font-size: 14px;
        color: #666;
      }
      pre {
        background: #f8f8f8;
        padding: 12px;
        border: 1px solid #eee;
        border-radius: 4px;
        font-size: 12px;
        overflow: auto;
        width: 100%;
        box-sizing: border-box;
        margin-top: 10px;
      }
      #init-btn {
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div
      id="page-description"
      style="
        position: fixed;
        top: 10px;
        right: 10px;
        background: rgba(0, 0, 0, 0.8);
        color: #fff;
        padding: 10px;
        border-radius: 8px;
        font-size: 21px;
        z-index: 1000;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        max-width: 300px;
        backdrop-filter: blur(5px);
      "
    >
      Web Component variant optimized to avoid multiple CSS requests, loading styles inline or pre-fetched.
    </div>
    <div style="padding: 20px">
      <h1>Load CSS in esm</h1>
      <ace-editor lang="javascript">
        <script type="ace">

          import { OptionsSection } from "./options-section.js";

          // 1. If using a bundler like Vite/Webpack:
          // OptionsSection.cssText = (await import("./OptionsSectionManager.css?raw")).default;

          const css1 = await fetch("../../floating-label-pattern.css").then(r => r.text());
          // where floating-label-pattern.css is not needed really, but is here to show how to load multiple css files

          const css2 = await fetch("./OptionsSectionManager.css").then(r => r.text());
          OptionsSection.cssText = css1 + "\n" + css2;
        </script>
      </ace-editor>
      <hr />
      <button id="init-btn" class="gcp-css">Initialize Component</button> |
      <a href="" id="reload-link" class="gcp-css">reload</a> |
      <a href="./" class="gcp-css">up ..</a>

      <div id="instances-area"></div>

      <script type="module" src="OptionsSectionManagerWebComponent.nocssrequest.html.js"></script>
      <script
        type="module"
        src="https://stopsopa.github.io/ace-editor-webcomponent/ace-web-component.js"
        data-main-ace="https://stopsopa.github.io/ace-editor-webcomponent/noprettier/ace/ace-builds-1.43.4/src-min-noconflict/ace.js"
      ></script>
    </div>
  </body>
</html>
