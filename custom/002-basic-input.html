<link rel="stylesheet" href="https://stopsopa.github.io/pages/js/popper/html-vanilla/popover.css" />
<style>
  .web-select-component {
    position: relative;
    display: flex;
    align-items: center;
    padding: 0;
    box-sizing: border-box;
    font-family: inherit;
    background: #fff;
    margin-bottom: 19px;
    cursor: text;

    &::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 4px;
      box-shadow: 0 0 0 1px var(--gcp-css-border, #99999b);
      transition: box-shadow var(--gcp-css-transition, 150ms cubic-bezier(0.4, 0, 0.2, 1));
      pointer-events: none;
      z-index: 0;
    }

    &:focus-within::after {
      box-shadow: 0 0 0 2px var(--gcp-css-primary, #1a73e8);
    }

    .floating-label {
      position: absolute;
      left: 0;
      margin-left: 7px;
      top: 9px; /* Matches standard gcp-css label alignment */
      font-size: 16px;
      color: var(--gcp-css-gray-text, #5f6368);
      pointer-events: none;
      transition:
        transform var(--gcp-css-transition, 150ms),
        font-size var(--gcp-css-transition, 150ms),
        color var(--gcp-css-transition, 150ms),
        top var(--gcp-css-transition, 150ms);
      background: #fff;
      padding: 0 4px;
      z-index: 3;
      line-height: 1;
    }

    /* Float condition */
    &:focus-within .floating-label,
    &:has(.element) .floating-label,
    &:has(input:not(:placeholder-shown)) .floating-label {
      top: 0;
      transform: translateY(-50%);
      font-size: 12px;
    }

    .flex-list {
      display: flex;
      flex-wrap: wrap;
      flex-grow: 1;
      row-gap: 0; /* Option margins handle vertical spacing */
      column-gap: 6px;
      align-items: center;
      z-index: 1;
      min-width: 0;
      padding: 0;
      padding-left: 12px;
      padding-top: 2px;
      padding-bottom: 2px;

      /* Shared vertical sizing for all direct children */
      > * {
        font-size: 16px;
        line-height: 1.15;
        padding-top: 3px;
        padding-bottom: 3px;
        box-sizing: border-box;
        margin-top: 3px;
        margin-bottom: 3px;
      }

      input {
        border: none;
        outline: none;
        background: transparent;
        field-sizing: content; /* Grows with typed content — no JS needed */
        min-width: 1px;
        padding-left: 0;
        padding-right: 0;
        font-family: inherit;
        color: inherit;

        &::placeholder {
          color: transparent;
        }
      }
    }

    .buttons-container {
      display: flex;
      align-items: center;
      margin-left: auto;
      padding-left: 4px;
      z-index: 2;
      flex-shrink: 0;

      button {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 14px;
        padding: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--gcp-css-gray-text, #5f6368);
        line-height: 1;

        &:hover {
          color: #333;
        }
      }
    }

    .element {
      display: flex;
      align-items: center;
      background: rgb(0 0 0 / 12%);
      border-radius: 2px;
      padding-left: 4px;
      padding-right: 5px;
      color: rgba(0, 0, 0, 0.88);
      margin-left: -4px;
      margin-right: 5px;

      [data-delete] {
        cursor: pointer;
        margin-left: 4px;
        width: 14px;
        height: 14px;
        min-width: 14px;
        min-height: 14px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;

        &::before {
          content: "✕";
          font-size: 10px;
          line-height: 1;
          color: rgba(0, 0, 0, 0.45);
        }

        &:hover {
          background-color: rgba(0, 0, 0, 0.08);

          &::before {
            color: rgba(0, 0, 0, 0.85);
          }
        }
      }
    }
  }
  [data-popover] {
    --popover-offset: 0px; /* NOTE: you can remove it from here and define in :root {--popover-offset: 10px;} to controll it globally */
    width: anchor-size(width); /* Matches width of the source element passed in showPopover({ source }) */
    box-sizing: border-box;
    flex-direction: column;
    max-height: 300px;

    &:popover-open {
      display: flex; /* Only apply flex when popover is shown */
    }

    .filter {
      flex-shrink: 0; /* Stick to top, don't shrink */
    }

    .options {
      flex: 1;
      overflow-y: auto;
      min-height: 0; /* Required for flex child scrolling */
    }

    .footer {
      flex-shrink: 0; /* Stick to bottom, don't shrink */
      padding-top: 4px;
    }
  }
</style>

<button id="add">Add element</button>
<!-- <alert-box> value and label provided in one object -> label shown, value returned as a value </alert-box> -->

<script type="module">
  import "../../js/CenterResizer.js";
  const webSelectComponent = document.querySelector(".web-select-component");
  const add = document.getElementById("add");
  const flexList = webSelectComponent.querySelector(".flex-list");
  const input = flexList.querySelector("input");
  const clearBtn = webSelectComponent.querySelector(".clear-btn");
  const form = document.querySelector("form");
  const options = webSelectComponent.querySelector(".options");

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    // const value = input.value.trim();
    // if (!value) {
    //   return;
    // }
    // input.value = "";
    // resizeInput();

    // const option = document.createElement("option");

    // const label = document.createElement("label");
    // label.textContent = value;

    // const divX = document.createElement("div");
    // divX.textContent = "X";
    // divX.addEventListener("click", () => {
    //   option.remove();
    // });

    // option.appendChild(label);
    // option.appendChild(divX);

    // flexList.insertBefore(option, input);
  });

  add.addEventListener("click", () => {
    const value = input.value.trim();
    if (!value) {
      return;
    }
    input.value = "";

    const option = document.createElement("div");
    option.className = "element";

    const label = document.createElement("label");
    label.textContent = value;

    const divX = document.createElement("div");

    option.appendChild(label);
    option.appendChild(divX);

    flexList.insertBefore(option, input);
  });

  // Delegated handler: clicking any option's div removes that option
  flexList.addEventListener("click", (e) => {
    const removeBtn = e.target.closest("[data-delete]");
    if (removeBtn) {
      removeBtn.closest(".element").remove();
    }
  });

  clearBtn.addEventListener("click", () => {
    const options = flexList.querySelectorAll(".element");
    options.forEach((opt) => opt.remove());
  });

  const popoverEl = webSelectComponent.querySelector("[data-popover]");

  webSelectComponent.addEventListener("click", (e) => {
    // just test event, later should be removed in final implementation of the component
    if (e.target.closest(".element")) {
      // <div class="element">
      //   <label>Label 1 fsfdsaf</label>
      //   <div data-delete></div>
      // </div>
      // add one more options
      const option = document.createElement("div");
      option.className = "element";

      const label = document.createElement("label");
      label.textContent = "Label 1 fsfdsaf";

      const divX = document.createElement("div");
      divX.textContent = "X";
      option.appendChild(label);
      option.appendChild(divX);

      // append just after that one
      options.insertBefore(option, e.target.closest(".element").nextSibling);
    }
  });
  webSelectComponent.addEventListener("click", (e) => {
    // If click came from a hide button (or inside one), hide and stop
    if (e.target.closest(`[popovertargetaction="hide"]`)) {
      popoverEl.hidePopover();
      return;
    }

    // If click came from buttons-container or option X, skip popover
    if (e.target.closest(".buttons-container") || e.target.closest("[data-delete]")) {
      return;
    }

    input.focus();
    popoverEl.showPopover({
      source: webSelectComponent,
    });
  });
</script>
