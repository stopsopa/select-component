<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resizer Demo</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
        }
        .events {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .event-box {
            flex: 1;
            padding: 10px;
            background: #f4f4f4;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .event-box h4 {
            margin-top: 0;
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
        }
        pre {
            margin: 0;
            font-size: 18px;
            font-weight: bold;
            color: #007bff;
        }
    </style>
</head>
<body>

    <center-and-height-resizer id="resizer" left="100px" center="100px" height="200px">
        <div style="padding: 20px; background: #fff; height: 100%; box-sizing: border-box;">
            <h3>Content Area</h3>
            <p>Resize me!</p>
        </div>
    </center-and-height-resizer>

    <div class="events">
        <div class="event-box">
            <h4>onLeft</h4>
            <pre id="val-left">100px</pre>
        </div>
        <div class="event-box">
            <h4>onCenter</h4>
            <pre id="val-center">100px</pre>
        </div>
        <div class="event-box">
            <h4>onHeight</h4>
            <pre id="val-height">200px</pre>
        </div>
    </div>

    <script type="module">
        import './CenterAndHeightResizer.js';

        const resizer = document.getElementById('resizer');
        const valLeft = document.getElementById('val-left');
        const valCenter = document.getElementById('val-center');
        const valHeight = document.getElementById('val-height');

        // Initial load from URL
        const params = new URLSearchParams(window.location.search);
        ['left', 'center', 'height'].forEach(key => {
            const val = params.get(key);
            if (val) {
                resizer.setAttribute(key, val);
                const el = document.getElementById('val-' + key);
                if (el) el.textContent = val.includes('px') ? val : val + 'px';
            }
        });

        const updateUrl = () => {
            const url = new URL(window.location.href);
            url.searchParams.set('left', resizer.getAttribute('left'));
            url.searchParams.set('center', resizer.getAttribute('center'));
            url.searchParams.set('height', resizer.getAttribute('height'));
            window.history.replaceState({}, '', url.toString());
        };

        resizer.addEventListener('onLeft', e => {
            const val = e.detail.width + 'px';
            valLeft.textContent = val;
            updateUrl();
        });

        resizer.addEventListener('onCenter', e => {
            const val = e.detail.width + 'px';
            valCenter.textContent = val;
            updateUrl();
        });

        resizer.addEventListener('onHeight', e => {
            const val = e.detail.height + 'px';
            valHeight.textContent = val;
            updateUrl();
        });
    </script>
</body>
</html>
